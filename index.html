                        card.appendChild(placeholder);
                        comicSwipeWrapper.appendChild(card);
                        comicState.pageElements.push(card);
                    }
                }

                function comicSetPageImage(index, blobUrl, name) {
                    if (!comicState.pageElements[index]) return;
                    var card = comicState.pageElements[index];
                    var existing = card.querySelector('.comic-img');
                    if (existing) {
                        existing.src = blobUrl;
                        return;
                    }
                    var img = document.createElement('img');
                    img.className = 'comic-img';
                    img.src = blobUrl;
                    img.alt = name || 'page_' + (index+1);
                    img.draggable = false;
                    card.innerHTML = '';
                    card.appendChild(img);
                }

                async function comicLoadFromCache(cachedData) {
                    var images = cachedData.images;
                    comicState.totalPages = cachedData.total || images.length;
                    comicState.name = cachedData.name || comicState.link;
                    
                    // 恢复 allEntries 元数据，用于继续加载后续页面
                    if (cachedData.allEntriesMeta && cachedData.allEntriesMeta.length > 0) {
                        comicState.allEntries = cachedData.allEntriesMeta.map(function(meta) {
                            return { path: meta.path, file: null };
                        });
                    } else {
                        // 兼容旧缓存
                        comicState.allEntries = [];
                        for (var i = 0; i < comicState.totalPages; i++) {
                            comicState.allEntries.push({ path: 'page_' + (i+1), file: null });
                        }
                    }
                    
                    comicCreatePlaceholders(comicState.totalPages);
                    comicState.currentMeta = [];
                    comicState.loadedCount = 0;

                    for (var i = 0; i < images.length && i < comicState.totalPages; i++) {
                        var imgData = images[i];
                        if (imgData.blob) {
                            try {
                                var url = URL.createObjectURL(imgData.blob);
                                comicState.currentMeta[i] = {
                                    name: imgData.name || 'page_' + (i+1),
                                    blobUrl: url,
                                    loaded: true,
                                    file: null
                                };
                                comicState.loadedCount++;
                                comicSetPageImage(i, url, imgData.name || 'page_' + (i+1));
                            } catch (e) {
                                console.warn('恢复缓存图片失败:', i, e);
                                comicState.currentMeta[i] = {
                                    name: imgData.name || 'page_' + (i+1),
                                    blobUrl: null,
                                    loaded: false,
                                    file: null
                                };
                            }
                        } else {
                            comicState.currentMeta[i] = {
                                name: imgData.name || 'page_' + (i+1),
                                blobUrl: null,
                                loaded: false,
                                file: null
                            };
                        }
                    }

                    for (var i = 0; i < comicState.totalPages; i++) {
                        if (!comicState.currentMeta[i]) {
                            comicState.currentMeta[i] = {
                                name: 'page_' + (i+1),
                                blobUrl: null,
                                loaded: false,
                                file: null
                            };
                        }
                    }
                    return comicState.loadedCount;
                }

                async function comicParseZipForImages(zipBlob) {
                    var zip = await JSZip.loadAsync(zipBlob);
                    var all = [];
                    zip.forEach(function(path, file) {
                        if (!file.dir) all.push({ path: path, file: file });
                    });
                    var exts = ['.jpg','.jpeg','.png','.gif','.webp','.bmp','.jfif'];
                    var images = all.filter(function(e) {
                        return exts.some(function(ext) { return e.path.toLowerCase().endsWith(ext); });
                    });
                    images.sort(function(a, b) {
                        return a.path.localeCompare(b.path, undefined, { numeric: true });
                    });
                    if (!images.length) throw new Error('未找到图片');
                    return images;
                }

                async function comicLoadBatch(startIndex, count) {
                    var endIndex = Math.min(startIndex + count, comicState.allEntries.length);
                    var batch = comicState.allEntries.slice(startIndex, endIndex);
                    if (batch.length === 0) return;

                    // 如果没有 zipBlobCache，尝试从缓存恢复
                    if (!comicState.zipBlobCache) {
                        console.warn('ZIP缓存丢失，无法加载后续页面');
                        return;
                    }

                    for (var idx = 0; idx < batch.length; idx++) {
                        var entry = batch[idx];
                        var globalIdx = startIndex + idx;
                        if (globalIdx >= comicState.currentMeta.length) continue;
                        if (comicState.currentMeta[globalIdx].loaded) continue;
                        try {
                            var blob = await entry.file.async('blob');
                            var url = URL.createObjectURL(blob);
                            comicState.currentMeta[globalIdx].blobUrl = url;
                            comicState.currentMeta[globalIdx].loaded = true;
                            comicState.loadedCount++;
                            comicSetPageImage(globalIdx, url, entry.path);
                        } catch (e) {
                            console.warn('加载失败:', globalIdx, e);
                        }
                    }
                }

                function comicCheckAndLoadMore() {
                    if (!comicSwipeWrapper || comicState.isLoading || comicState.loadedCount >= comicState.allEntries.length || !comicState.allEntries.length) return;

                    var scrollTop = comicSwipeWrapper.scrollTop;
                    var pageHeight = window.innerHeight;
                    var visibleIndex = Math.round(scrollTop / pageHeight);
                    
                    var loadedBatchCount = Math.ceil(comicState.loadedCount / BATCH_SIZE) * BATCH_SIZE;
                    if (visibleIndex >= loadedBatchCount - TRIGGER_INDEX - 1 && comicState.loadedCount < comicState.allEntries.length) {
                        var nextStart = comicState.loadedCount;
                        var remaining = comicState.allEntries.length - comicState.loadedCount;
                        var toLoad = Math.min(BATCH_SIZE, remaining);
                        if (toLoad > 0) {
                            comicState.isLoading = true;
                            comicLoadBatch(nextStart, toLoad).finally(function() {
                                comicState.isLoading = false;
                                if (comicState.loadedCount < comicState.allEntries.length) {
                                    setTimeout(comicCheckAndLoadMore, 300);
                                }
                            });
                        }
                    }
                }

                function comicSaveCurrentProgress() {
                    if (!comicState.link || comicState.totalPages === 0) return;
                    if (comicState.saveTimer) clearTimeout(comicState.saveTimer);
                    comicState.saveTimer = setTimeout(function() {
                        var scrollTop = comicSwipeWrapper.scrollTop;
                        var pageHeight = window.innerHeight;
                        var visibleIndex = Math.round(scrollTop / pageHeight);
                        var safeIndex = Math.max(0, Math.min(visibleIndex, comicState.totalPages - 1));
                        
                        if (safeIndex !== comicState.lastSavedPage) {
                            saveComicProgress(comicState.link, safeIndex);
                            comicState.lastSavedPage = safeIndex;
                        }
                        comicState.saveTimer = null;
                    }, 400);
                }

                function comicGotoProgress(savedIndex) {
                    if (!comicSwipeWrapper || !comicState.pageElements.length) return;
                    if (savedIndex > 0 && savedIndex < comicState.totalPages) {
                        var target = savedIndex * window.innerHeight;
                        setTimeout(function() {
                            comicSwipeWrapper.scrollTo({ top: target, behavior: 'smooth' });
                            updateComicProgressDisplay(savedIndex);
                            comicState.lastSavedPage = savedIndex;
                            // 检查是否需要加载更多
                            if (savedIndex >= comicState.loadedCount - 2) {
                                comicCheckAndLoadMore();
                            }
                        }, 150);
                    } else {
                        setTimeout(function() {
                            comicSwipeWrapper.scrollTo({ top: 0, behavior: 'instant' });
                            updateComicProgressDisplay(0);
                            comicState.lastSavedPage = 0;
                        }, 60);
                    }
                }

                // 提取ZIP直链
                var ZIP_PATTERNS = [
                    /https:\/\/app-storage\.loadly\.io\/[a-f0-9]+\.zip(?:\?[^\s"']*)?/i,
                    /https:\/\/[a-z0-9]+\.loadly\.io\/[a-f0-9]+\.zip(?:\?[^\s"']*)?/i,
                    /https:\/\/[^\s"']+\.zip/i,
                    /https:\/\/[^\s"']+\.cbz/i
                ];

                async function extractZipDirectUrl(shareUrl, retry) {
                    retry = retry || 0;
                    var normalized = shareUrl.trim();
                    if (!normalized.startsWith('http')) {
                        if (normalized.startsWith('loadly.io/')) normalized = 'https://' + normalized;
                        else normalized = 'https://loadly.io/' + normalized.replace(/^\/+/, '');
                    }
                    var controller = new AbortController();
                    var timeoutId = setTimeout(function() { controller.abort(); }, 12000);
                    try {
                        var response = await safeFetch(normalized, {
                            signal: controller.signal,
                            headers: { 'User-Agent': 'Mozilla/5.0 (compatible; ComicLoader)' }
                        });
                        clearTimeout(timeoutId);
                        if (!response.ok) throw new Error('HTTP ' + response.status);
                        var html = await response.text();
                        for (var i = 0; i < ZIP_PATTERNS.length; i++) {
                            var match = html.match(ZIP_PATTERNS[i]);
                            if (match) return match[0];
                        }
                        var fallback = html.match(/https:\/\/[^\s"']+\.(?:zip|cbz)(?:\?[^\s"']*)?/i);
                        if (fallback) return fallback[0];
                        throw new Error('未找到ZIP直链');
                    } catch (err) {
                        clearTimeout(timeoutId);
                        if (retry < 2) {
                            await new Promise(function(r) { setTimeout(r, 800); });
                            return extractZipDirectUrl(normalized, retry + 1);
                        }
                        throw err;
                    }
                }

                function showComicLoading(msg, show) {
                    if (show) {
                        comicLoadingMsg.textContent = msg;
                        comicLoadingTip.style.display = 'flex';
                    } else {
                        comicLoadingTip.style.display = 'none';
                    }
                }

                async function startComic(comicUrl, comicName) {
                    if (comicState.isLoading) return;
                    if (!comicUrl || !comicUrl.trim()) return;

                    comicState.isLoading = true;
                    comicState.abortSignal = new AbortController();
                    comicRevokeAll();
                    comicState.link = comicUrl.trim();
                    comicState.name = comicName || comicState.link;
                    
                    // 显示漫画名
                    comicReaderTitle.textContent = comicState.name.length > 30 ? comicState.name.substring(0,28)+'...' : comicState.name;
                    comicReaderOverlay.style.display = 'flex';
                    
                    var savedIndex = getComicProgress(comicState.link);

                    showComicLoading('🔍 检查本地缓存...', true);
                    var hasCache = await hasCachedComic(comicState.link);
                    
                    if (hasCache) {
                        comicState.isFromCache = true;
                        showComicLoading('📂 从缓存加载漫画...', true);
                        
                        try {
                            var cachedData = await getCachedComic(comicState.link);
                            if (cachedData && cachedData.images && cachedData.images.length > 0) {
                                await comicLoadFromCache(cachedData);
                                showComicLoading('', false);
                                
                                // 设置滚动事件
                                if (comicState.scrollCleanup) {
                                    comicState.scrollCleanup();
                                    comicState.scrollCleanup = null;
                                }
                                var scrollHandler = function() {
                                    comicCheckAndLoadMore();
                                    comicSaveCurrentProgress();
                                };
                                comicSwipeWrapper.addEventListener('scroll', scrollHandler);
                                comicState.scrollCleanup = function() {
                                    comicSwipeWrapper.removeEventListener('scroll', scrollHandler);
                                };
                                
                                // 如果有保存的进度，跳转
                                if (savedIndex > 0 && savedIndex < comicState.totalPages) {
                                    comicGotoProgress(savedIndex);
                                } else {
                                    comicGotoProgress(0);
                                }
                                
                                // 检查是否需要加载更多
                                setTimeout(comicCheckAndLoadMore, 500);
                                
                                comicState.isLoading = false;
                                comicState.abortSignal = null;
                                return;
                            } else {
                                await clearCachedComic(comicState.link);
                                comicState.isFromCache = false;
                            }
                        } catch (err) {
                            console.error('缓存加载失败，重新下载', err);
                            await clearCachedComic(comicState.link);
                            comicState.isFromCache = false;
                        }
                    }
                    
                    comicState.isFromCache = false;
                    showComicLoading('⚡ 提取直链中...', true);
                    
                    try {
                        var directUrl = await extractZipDirectUrl(comicState.link);
                        showComicLoading('📥 下载漫画包...', true);

                        var response = await safeFetch(directUrl, { signal: comicState.abortSignal.signal });
                        if (!response.ok) throw new Error('下载失败 ' + response.status);
                        
                        var zipBlob = await response.blob();
                        comicState.zipBlobCache = zipBlob;
                        
                        showComicLoading('📚 解析漫画目录...', true);
                        
                        comicState.allEntries = await comicParseZipForImages(zipBlob);
                        comicState.totalPages = comicState.allEntries.length;
                        
                        comicState.currentMeta = comicState.allEntries.map(function(e) { 
                            return { name: e.path, blobUrl: null, loaded: false, file: e.file };
                        });

                        comicCreatePlaceholders(comicState.totalPages);
                        showComicLoading('', false);

                        var firstBatch = Math.min(BATCH_SIZE, comicState.totalPages);
                        await comicLoadBatch(0, firstBatch);
                        
                        // 设置滚动事件
                        if (comicState.scrollCleanup) {
                            comicState.scrollCleanup();
                            comicState.scrollCleanup = null;
                        }
                        var scrollHandler = function() {
                            comicCheckAndLoadMore();
                            comicSaveCurrentProgress();
                        };
                        comicSwipeWrapper.addEventListener('scroll', scrollHandler);
                        comicState.scrollCleanup = function() {
                            comicSwipeWrapper.removeEventListener('scroll', scrollHandler);
                        };

                        if (savedIndex > 0 && savedIndex < comicState.totalPages) {
                            comicGotoProgress(savedIndex);
                        } else {
                            comicGotoProgress(0);
                        }

                        // 保存缓存（包含 allEntries 元数据）
                        saveCachedComic(comicState.link, comicState.name, comicState.allEntries, comicState.currentMeta, comicState.totalPages);

                        if (comicState.loadedCount < comicState.totalPages) {
                            setTimeout(comicCheckAndLoadMore, 400);
                        }

                    } catch (err) {
                        console.error(err);
                        showComicLoading('', false);
                        comicRevokeAll();
                        var errCard = document.createElement('div');
                        errCard.className = 'comic-page-card';
                        var errDiv = document.createElement('div');
                        errDiv.style.cssText = 'color:white;text-align:center;background:rgba(0,0,0,0.8);padding:30px;border-radius:20px;font-size:1rem;';
                        errDiv.textContent = '⚠️ 加载失败\n' + (err.message || '请检查链接或网络');
                        errCard.appendChild(errDiv);
                        comicSwipeWrapper.innerHTML = '';
                        comicSwipeWrapper.appendChild(errCard);
                        comicReaderTitle.textContent = '❌ 加载失败';
                    } finally {
                        showComicLoading('', false);
                        comicState.isLoading = false;
                        comicState.abortSignal = null;
                    }
                }

                function closeComicReader() {
                    if (comicState.scrollCleanup) {
                        comicState.scrollCleanup();
                        comicState.scrollCleanup = null;
                    }
                    if (comicState.saveTimer) {
                        clearTimeout(comicState.saveTimer);
                        comicState.saveTimer = null;
                    }
                    comicReaderOverlay.style.display = 'none';
                    // 保留状态以便重新打开时恢复
                }
                if (closeComicReaderBtn) closeComicReaderBtn.addEventListener('click', closeComicReader);

                // ============================================================
                //  32. 图书分区渲染 (包含小说 + 漫画)
                // ============================================================
                function renderBooksGrid(keyword) {
                    var html = '<div class="books-section">';
                    
                    html += '<div class="section-header"><div class="section-title">📚 小说</div><span class="section-badge">' + txtBooks.length + ' 本</span></div>';
                    var books = txtBooks;
                    if (keyword) {
                        books = txtBooks.filter(function(b) { return b.name.toLowerCase().includes(keyword.toLowerCase()); });
                    } else {
                        books = getRandomItems(txtBooks, 3);
                    }
                    if (books.length) {
                        html += '<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px;">';
                        books.forEach(function(b) {
                            html += '<div class="book-card" data-id="' + b.id + '" data-type="book"><div class="book-name">' + escapeHtml(b.name) + '</div><span class="book-read-badge ' + themeClass + '">开始阅读</span></div>';
                        });
                        html += '</div>';
                    } else {
                        html += '<div class="empty-message" style="margin-top:0;">📭 未找到相关小说</div>';
                    }
                    
                    html += '<div class="section-header" style="margin-top:20px;"><div class="section-title">📖 漫画</div><span class="section-badge">' + comicBooks.length + ' 部</span></div>';
                    var comics = comicBooks;
                    if (keyword) {
                        comics = comicBooks.filter(function(c) { return c.name.toLowerCase().includes(keyword.toLowerCase()); });
                    } else {
                        comics = getRandomItems(comicBooks, 3);
                    }
                    if (comics.length) {
                        html += '<div style="display:flex;flex-direction:column;gap:10px;">';
                        comics.forEach(function(c) {
                            html += '<div class="book-card" data-id="' + c.id + '" data-type="comic"><div class="book-name">' + escapeHtml(c.name) + '</div><span class="book-read-badge ' + themeClass + '">开始阅读</span></div>';
                        });
                        html += '</div>';
                    } else {
                        html += '<div class="empty-message" style="margin-top:0;">📭 未找到相关漫画</div>';
                    }
                    
                    html += '</div>';
                    grid.innerHTML = html;
                    
                    document.querySelectorAll('.book-card[data-type="book"]').forEach(function(card) {
                        var bid = card.dataset.id;
                        var book = txtBooks.find(function(b) { return b.id === bid; });
                        var badge = card.querySelector('.book-read-badge');
                        var open = function() { if (book) openBook(book); };
                        if (badge) {
                            badge.addEventListener('click', function(e) { e.stopPropagation(); open(); });
                        }
                        card.addEventListener('click', function(e) {
                            if (!e.target.classList.contains('book-read-badge')) open();
                        });
                    });
                    
                    document.querySelectorAll('.book-card[data-type="comic"]').forEach(function(card) {
                        var cid = card.dataset.id;
                        var comic = comicBooks.find(function(c) { return c.id === cid; });
                        var badge = card.querySelector('.book-read-badge');
                        var open = function() { 
                            if (comic) {
                                startComic(comic.url, comic.name);
                            }
                        };
                        if (badge) {
                            badge.addEventListener('click', function(e) { e.stopPropagation(); open(); });
                        }
                        card.addEventListener('click', function(e) {
                            if (!e.target.classList.contains('book-read-badge')) open();
                        });
                    });
                }

                // ============================================================
                //  33. 统一渲染
                // ============================================================
                function renderGrid() {
                    if (!grid) return;
                    if (currentCategory === 'movies') { renderMoviesGrid(currentSearchKeyword); return; }
                    if (currentCategory === 'music') {
                        renderMusicGrid();
                        return;
                    }
                    if (currentCategory === 'books') {
                        if (!txtBooksLoaded || !comicBooksLoaded) {
                            grid.innerHTML = '<div class="empty-message">📖 加载小说和漫画列表中...</div>';
                            Promise.all([loadTxtBooks(), loadComicBooks()]).then(function() {
                                renderBooksGrid(currentSearchKeyword);
                            });
                        } else {
                            renderBooksGrid(currentSearchKeyword);
                        }
                        return;
                    }
                    
                    var filtered = apps.filter(function(a) {
                        return a.category === currentCategory && (PLATFORM_SPECIFIC_CATEGORIES.indexOf(currentCategory) === -1 || a.platform === devicePlatform);
                    });
                    if (currentSearchKeyword && currentSearchKeyword.trim() !== '') {
                        var kw = currentSearchKeyword.trim().toLowerCase();
                        filtered = filtered.filter(function(app) { return app.name.toLowerCase().includes(kw); });
                    }
                    initLazyAppGrid(filtered);
                }

                function performSearch(kw) {
                    currentSearchKeyword = kw;
                    if (currentCategory === 'movies') renderMoviesGrid(kw);
                    else if (currentCategory === 'music') {
                        if (kw && kw.trim() !== '') {
                            performSearchMusic(kw);
                        } else {
                            var dailyDiv = document.getElementById('daily-recommendations');
                            var container = document.getElementById('music-results-container');
                            var refreshBtn = document.getElementById('refreshDailyBtn');
                            if (dailyDiv) dailyDiv.style.display = 'block';
                            if (container) container.style.display = 'none';
                            if (refreshBtn) refreshBtn.classList.remove('hidden');
                        }
                    }
                    else if (currentCategory === 'books') {
                        if (txtBooksLoaded && comicBooksLoaded) renderBooksGrid(kw);
                        else Promise.all([loadTxtBooks(), loadComicBooks()]).then(function() { renderBooksGrid(kw); });
                    }
                    else { renderGrid(); }
                }

                function resetToHome() {
                    currentSearchKeyword = '';
                    searchInput.value = '';
                    if (currentCategory === 'music') {
                        var dailyDiv = document.getElementById('daily-recommendations');
                        var container = document.getElementById('music-results-container');
                        var refreshBtn = document.getElementById('refreshDailyBtn');
                        if (dailyDiv) dailyDiv.style.display = 'block';
                        if (container) container.style.display = 'none';
                        if (refreshBtn) refreshBtn.classList.remove('hidden');
                    }
                    renderGrid();
                }

                searchInput?.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        var kw = searchInput.value.trim();
                        if (kw) performSearch(kw);
                        else resetToHome();
                    }
                });
                searchCancelBtn?.addEventListener('click', resetToHome);
                
                navItems.forEach(function(item) {
                    item.addEventListener('click', function() {
                        currentCategory = this.dataset.cat;
                        currentSearchKeyword = '';
                        searchInput.value = '';
                        navItems.forEach(function(i) {
                            i.classList.remove('active', 'ios-theme', 'android-theme');
                        });
                        this.classList.add('active', themeClass);
                        resetBatchManager();
                        renderGrid();
                    });
                });

                // ============================================================
                //  34. 游戏 (像素冲刺)
                // ============================================================
                var gameOverlay = document.getElementById('gameOverlay');
                document.getElementById('closeGameBtn')?.addEventListener('click', function() {
                    gameOverlay.classList.remove('show');
                });
                var clickCount = 0;
                logo.addEventListener('click', function() {
                    clickCount++;
                    if (clickCount >= 5) {
                        clickCount = 0;
                        gameOverlay.classList.add('show');
                    }
                });

                // ============================================================
                //  35. 启动
                // ============================================================
                applyTheme();
                loadMovieData().then(function() {
                    return loadAppsFromData();
                }).then(function() {
                    return Promise.all([loadTxtBooks(), loadComicBooks()]);
                }).then(function() {
                    mergeUserApps();
                    renderGrid();
                });

                var downloadOverlay = document.getElementById('downloadOverlay');
                var downloadIframe = document.getElementById('downloadIframe');
                var closeDownload = document.getElementById('closeDownload');
                if (closeDownload) {
                    closeDownload.addEventListener('click', function() {
                        downloadOverlay.style.display = 'none';
                        downloadIframe.src = 'about:blank';
                    });
                }

                function escapeHtml(str) {
                    if (!str) return '';
                    return str.replace(/[&<>]/g, function(m) {
                        if (m === '&') return '&amp;';
                        if (m === '<') return '&lt;';
                        if (m === '>') return '&gt;';
                        return m;
                    });
                }

                window.playSong = playSong;
                window.openBook = openBook;
                window.startComic = startComic;
            }
        })();
    </script>
    <script>
        (function() {
            var URL_RULES = [
                { pattern: /\.ipa$/i, platform: 'ios', category: 'apps' },
                { pattern: /\.gipa$/i, platform: 'ios', category: 'games' },
                { pattern: /\.apk$/i, platform: 'android', category: 'apps' },
                { pattern: /\.apkg$/i, platform: 'android', category: 'games' }
            ];
            window.smartParseUrl = function(url) {
                var ext = (url.match(/\.([a-z0-9]+)(?:[?#]|$)/i) || [])[1] || '';
                var rule = URL_RULES.find(function(r) { return r.pattern.test('.' + ext); });
                return { isValid: !!rule, platform: rule?.platform, category: rule?.category };
            };
        })();
    </script>
