<body>
    <div class="version-toast" id="versionToast">🎵 双源音乐 · 三行歌词</div>

    <div class="container">
        <div class="header">
            <div class="logo-area">
                <div class="logo-icon" id="logoIcon">C</div>
                <div class="logo-text">APP store</div>
            </div>
        </div>

        <div class="search-bar" id="searchBar">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="搜索当前分区..." autocomplete="off">
            <button class="search-cancel" id="searchCancelBtn">取消</button>
        </div>

        <div class="apps-grid" id="appsGrid"></div>
    </div>

    <div class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-cat="apps"><i>📱</i> 应用</button>
        <button class="nav-item" data-cat="games"><i>🎮</i> 游戏</button>
        <button class="nav-item" data-cat="movies"><i>🎬</i> 电影</button>
        <button class="nav-item" data-cat="music"><i>🎵</i> 音乐</button>
        <button class="nav-item" data-cat="books"><i>📚</i> 图书</button>
    </div>

    <div class="modal" id="appModal">
        <div class="modal-card">
            <h2 id="modalTitle">添加应用到收藏</h2>
            <div class="input-field"><label>应用名称</label><input type="text" id="appName" placeholder="例如: 我的应用"></div>
            <div class="input-field">
                <label>下载链接</label>
                <div class="url-input-row"><input type="url" id="appUrl" placeholder="https://loadly.io/..." value="https://loadly.io/"><button class="fetch-btn" id="fetchInfoBtn">获取</button></div>
                <div id="fetchStatus" class="fetch-status"></div>
            </div>
            <div class="input-field">
                <label>平台</label>
                <div class="platform-selector" id="platformSelector">
                    <div class="platform-option selected" data-platform="ios"><i>🍎</i> iOS</div>
                    <div class="platform-option" data-platform="android"><i>🤖</i> Android</div>
                </div>
                <input type="hidden" id="appPlatform" value="ios">
            </div>
            <div class="input-field">
                <label>分类</label>
                <select id="appCategory">
                    <option value="apps">📱 应用</option>
                    <option value="games">🎮 游戏</option>
                    <option value="movies">🎬 电影</option>
                    <option value="music">🎵 音乐</option>
                    <option value="books">📚 图书</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="modal-btn secondary" id="cancelModalBtn">取消</button>

    <script>
        (function() {
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initApp);
            } else {
                initApp();
            }

            function initApp() {
                function detectDevice() {
                    var ua = navigator.userAgent || navigator.vendor || window.opera;
                    if (/android/i.test(ua)) return 'android';
                    if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return 'ios';
                    return 'ios';
                }
                
                var deviceType = detectDevice();
                var themeClass = deviceType === 'android' ? 'android-theme' : 'ios-theme';
                var devicePlatform = deviceType;
                var PLATFORM_SPECIFIC_CATEGORIES = ['apps', 'games'];

                function applyTheme() {
                    var logoIcon = document.getElementById('logoIcon');
                    if (logoIcon) logoIcon.classList.add(themeClass);
                    
                    var navItems = document.querySelectorAll('.nav-item');
                    for (var i = 0; i < navItems.length; i++) {
                        if (navItems[i].classList.contains('active')) {
                            navItems[i].classList.add(themeClass);
                        }
                    }
                    
                    var badges = document.querySelectorAll('.download-badge');
                    for (var i = 0; i < badges.length; i++) {
                        badges[i].classList.add(themeClass);
                    }
                }

                // ===== 从 Loadly 获取应用列表（由 GitHub Actions 自动注入）=====
                var apps = [];
                try {
                    // 占位符会被 Actions 替换为 APPS_FROM_LOADLY 数组
                    <!-- APPS_PLACEHOLDER -->
                    if (typeof APPS_FROM_LOADLY !== 'undefined' && Array.isArray(APPS_FROM_LOADLY)) {
                        apps = APPS_FROM_LOADLY;
                        console.log('已加载 Loadly 应用列表，共', apps.length, '个');
                    }
                } catch(e) {
                    console.log('未找到 Loadly 数据，使用空列表');
                }

                // 合并用户通过页面添加的应用（localStorage）
                try { 
                    var saved = localStorage.getItem('appstore_apps_data'); 
                    if (saved) {
                        var parsed = JSON.parse(saved);
                        if (Array.isArray(parsed) && parsed.length) {
                            // 去重：基于 url 和 platform 合并，保留用户添加的优先
                            var urlMap = {};
                            for (var i = 0; i < apps.length; i++) {
                                urlMap[apps[i].url] = true;
                            }
                            for (var i = 0; i < parsed.length; i++) {
                                if (!urlMap[parsed[i].url]) {
                                    apps.push(parsed[i]);
                                    urlMap[parsed[i].url] = true;
                                }
                            }
                            console.log('已合并用户添加的应用，当前总数', apps.length);
                        }
                    }
                } catch(e) {
                    console.log('加载用户数据失败', e);
                }
                
                function saveApps() { 
                    try { 
                        // 只保存用户手动添加的应用（非 Loadly 来源）
                        // 为避免混淆，这里简单保存全部 apps，下次加载时会与 Loadly 数据去重合并
                        localStorage.setItem('appstore_apps_data', JSON.stringify(apps)); 
                    } catch(e){} 
                }

                // 音乐API配置 - 双源
                var MUSIC_APIS = [
                    { name: '真心源', url: 'https://ncm.zhenxin.me', active: true },
                    { name: '墨染源', url: 'https://zm.i9mr.com', active: true }
                ];

                var currentApiIndex = 0;
                
                var API_PATHS = {
                    search: '/search?keywords=',
                    songUrl: '/song/url?id=',
                    lyric: '/lyric?id=',
                    detail: '/song/detail?ids='
                };

                var grid = document.getElementById('appsGrid');
                var modal = document.getElementById('appModal');
                var appName = document.getElementById('appName');
                var appUrl = document.getElementById('appUrl');
                var appPlatform = document.getElementById('appPlatform');
                var appCategory = document.getElementById('appCategory');
                var cancelBtn = document.getElementById('cancelModalBtn');
                var saveBtn = document.getElementById('saveAppBtn');
                var fetchInfoBtn = document.getElementById('fetchInfoBtn');
                var platformOptions = document.querySelectorAll('.platform-option');
                var navItems = document.querySelectorAll('.nav-item');
                var floatingPlayer = document.getElementById('floatingPlayer');
                var audioPlayer = document.getElementById('audioPlayer');
                var playerTitle = document.getElementById('playerTitle');
                var playerArtist = document.getElementById('playerArtist');
                var lyricsContainer = document.getElementById('lyricsContainer');
                var closePlayerBtn = document.getElementById('closePlayerBtn');
                var versionToast = document.getElementById('versionToast');
                var searchInput = document.getElementById('searchInput');
                var searchCancelBtn = document.getElementById('searchCancelBtn');
                var logo = document.getElementById('logoIcon');

                var currentCategory = 'apps';
                var searchActive = false;

                applyTheme();

                for (var i = 0; i < platformOptions.length; i++) {
                    platformOptions[i].addEventListener('click', function(e) {
                        var opt = e.currentTarget;
                        for (var j = 0; j < platformOptions.length; j++) {
                            platformOptions[j].classList.remove('selected');
                        }
                        opt.classList.add('selected');
                        appPlatform.value = opt.dataset.platform;
                    });
                }

                var EXTENSION_RULES = {
                    'ipa': { platform: 'ios', category: 'apps' },
                    'apk': { platform: 'android', category: 'apps' },
                    'ipag': { platform: 'ios', category: 'games' },
                    'apkg': { platform: 'android', category: 'games' }
                };
                
                window.smartFetchFromUrl = function(url) {
                    var match = url.match(/\.([a-zA-Z]+)$/);
                    var ext = match ? match[1].toLowerCase() : '';
                    var rule = ext && EXTENSION_RULES[ext] ? EXTENSION_RULES[ext] : null;
                    var nameFromUrl = '';
                    
                    try {
                        var urlObj = new URL(url);
                        var path = urlObj.pathname;
                        var base = path.startsWith('/') ? path.substring(1) : path;
                        if (ext && base.endsWith('.' + ext)) {
                            base = base.substring(0, base.length - (ext.length + 1));
                        }
                        nameFromUrl = base.replace(/[._-]/g, ' ').trim();
                        if (nameFromUrl === '') nameFromUrl = base;
                    } catch (e) {}
                    
                    var finalName = nameFromUrl;
                    if (!finalName) {
                        try { 
                            var host = new URL(url).hostname.replace('www.', ''); 
                            finalName = host.split('.')[0]; 
                        } catch { 
                            finalName = '应用'; 
                        }
                    }
                    finalName = finalName.charAt(0).toUpperCase() + finalName.slice(1);
                    
                    if (rule) {
                        return { name: finalName, platform: rule.platform, category: rule.category, ext: ext };
                    } else {
                        return { name: finalName, platform: 'ios', category: 'apps', ext: ext || '未知' };
                    }
                };
                
                if (fetchInfoBtn) {
                    fetchInfoBtn.addEventListener('click', async function() {
                        var url = appUrl.value.trim();
                        if (!url) { 
                            alert('请输入下载链接'); 
                            return; 
                        }
                        var status = document.getElementById('fetchStatus');
                        status.innerText = '🔍 解析中...';
                        fetchInfoBtn.disabled = true;
                        
                        try {
                            var info = await window.smartFetchFromUrl(url);
                            appName.value = info.name;
                            appPlatform.value = info.platform;
                            
                            for (var i = 0; i < platformOptions.length; i++) {
                                var opt = platformOptions[i];
                                opt.classList.toggle('selected', opt.dataset.platform === info.platform);
                            }
                            
                            appCategory.value = info.category;
                            status.innerText = '✓ 已识别: ' + info.ext;
                        } catch (error) { 
                            status.innerText = '❌ 解析失败'; 
                        } finally { 
                            fetchInfoBtn.disabled = false; 
                        }
                    });
                }

                if (saveBtn) {
                    saveBtn.addEventListener('click', function() {
                        var name = appName.value.trim();
                        var url = appUrl.value.trim();
                        var platform = appPlatform.value;
                        var category = appCategory.value;
                        
                        if (!name || !url) { 
                            alert('请填写完整信息'); 
                            return; 
                        }
                        
                        apps.push({ 
                            id: Date.now() + '-' + Math.random(), 
                            name: name, 
                            url: url, 
                            platform: platform, 
                            category: category 
                        });
                        
                        saveApps();
                        modal.classList.remove('show');
                        renderGrid();
                        
                        appName.value = ''; 
                        appUrl.value = 'https://loadly.io/'; 
                        var status = document.getElementById('fetchStatus');
                        if (status) status.innerText = '';
                    });
                }
                
                if (cancelBtn) {
                    cancelBtn.addEventListener('click', function() {
                        modal.classList.remove('show');
                    });
                }
                
                if (logo) {
                    logo.addEventListener('click', function() {
                        versionToast.classList.add('show');
                        setTimeout(function() {
                            versionToast.classList.remove('show');
                        }, 2000);
                    });
                }

                // ========== 音乐功能 ==========
                function getCurrentApiUrl() {
                    return MUSIC_APIS[currentApiIndex] ? MUSIC_APIS[currentApiIndex].url : MUSIC_APIS[0].url;
                }

                // 切换API源
                function switchApi() {
                    currentApiIndex = (currentApiIndex + 1) % MUSIC_APIS.length;
                    var apiStatus = document.querySelector('.api-status');
                    if (apiStatus) {
                        apiStatus.innerText = '当前: ' + MUSIC_APIS[currentApiIndex].name;
                    }
                    return currentApiIndex;
                }

                async function searchMusic(keyword, page) {
                    if (!keyword) return;
                    var container = document.getElementById('music-results-container');
                    if (!container) return;
                    
                    container.style.display = 'block';
                    container.classList.add('has-results');
                    container.innerHTML = '<div class="loading">搜索音乐中...</div>';
                    
                    try {
                        var apiUrl = getCurrentApiUrl();
                        var offset = (page - 1) * 10;
                        var url = apiUrl + '/search?keywords=' + encodeURIComponent(keyword) + '&limit=10&offset=' + offset;
                        
                        var response = await fetch(url, { mode: 'cors' });
                        var data = await response.json();
                        
                        if (data.code === 200 && data.result && data.result.songs) {
                            renderMusicResults(data.result.songs, keyword, page, data.result.songCount || 100);
                            fetchSongCovers(data.result.songs);
                        } else {
                            container.innerHTML = '<div class="empty-message">未找到相关歌曲</div>';
                        }
                    } catch (e) {
                        console.log('搜索失败', e);
                        container.innerHTML = '<div class="empty-message">音乐源暂时不可用，请稍后重试</div>';
                    }
                }

                function renderMusicResults(songs, keyword, page, total) {
                    var container = document.getElementById('music-results-container');
                    if (!songs || songs.length === 0) {
                        container.innerHTML = '<div class="empty-message">未找到相关歌曲</div>';
                        return;
                    }
                    
                    var currentApi = MUSIC_APIS[currentApiIndex];
                    var html = '<div class="music-results-list">' +
                        '<div style="text-align:right; margin-bottom:8px;">' +
                        '<span class="api-status" onclick="switchMusicApi()" style="cursor: pointer;">当前: ' + currentApi.name + ' ↻</span>' +
                        '</div>';
                    
                    for (var i = 0; i < songs.length; i++) {
                        var song = songs[i];
                        var songId = song.id;
                        var songName = song.name;
                        var artists = '未知歌手';
                        if (song.artists) {
                            var artistNames = [];
                            for (var j = 0; j < song.artists.length; j++) {
                                artistNames.push(song.artists[j].name);
                            }
                            artists = artistNames.join('/');
                        } else if (song.ar) {
                            var artistNames = [];
                            for (var j = 0; j < song.ar.length; j++) {
                                artistNames.push(song.ar[j].name);
                            }
                            artists = artistNames.join('/');
                        }
                        
                        var album = '未知专辑';
                        if (song.album) album = song.album.name;
                        else if (song.al) album = song.al.name;
                        
                        // 歌名后面不再显示源名称
                        html += '<div class="music-item" data-source="netease" data-id="' + songId + '" data-name="' + songName.replace(/"/g, '&quot;') + '" data-artist="' + artists.replace(/"/g, '&quot;') + '">' +
                            '<div class="music-cover" data-song-id="' + songId + '" id="search-cover-' + songId + '">🎵</div>' +
                            '<div class="music-info">' +
                            '<div class="music-title">' + songName + '</div>' +
                            '<div class="music-artist">' + artists + '</div>' +
                            '<div class="music-album">' + album + '</div>' +
                            '</div>' +
                            '</div>';
                    }
                    html += '</div>';
                    
                    if (total > 10) {
                        html += '<div class="pagination">' +
                            '<button class="page-btn" id="music-prev-page"' + (page <= 1 ? ' disabled' : '') + '>← 上一页</button>' +
                            '<span class="page-info">第 ' + page + ' 页</span>' +
                            '<button class="page-btn" id="music-next-page"' + (songs.length < 10 ? ' disabled' : '') + '>下一页 →</button>' +
                            '</div>';
                    }
                    
                    container.innerHTML = html;
                    
                    var prev = document.getElementById('music-prev-page');
                    var next = document.getElementById('music-next-page');
                    if (prev) {
                        prev.addEventListener('click', function() {
                            if (page > 1) searchMusic(keyword, page - 1);
                        });
                    }
                    if (next) {
                        next.addEventListener('click', function() {
                            if (songs.length >= 10) searchMusic(keyword, page + 1);
                        });
                    }
                    
                    bindMusicItemEvents('#music-results-container .music-item');
                }

                async function fetchSongCovers(songs) {
                    for (var i = 0; i < songs.length; i++) {
                        var song = songs[i];
                        var songId = song.id;
                        var coverDiv = document.getElementById('search-cover-' + songId);
                        if (!coverDiv) continue;
                        
                        try {
                            var apiUrl = getCurrentApiUrl();
                            var url = apiUrl + '/song/detail?ids=' + songId;
                            var response = await fetch(url, { mode: 'cors' });
                            var data = await response.json();
                            var coverUrl = '';
                            
                            if (data.songs && data.songs[0]) {
                                var songDetail = data.songs[0];
                                if (songDetail.al && songDetail.al.picUrl) {
                                    coverUrl = songDetail.al.picUrl;
                                }
                            }
                            
                            if (coverUrl) {
                                coverDiv.innerHTML = '<img src="' + coverUrl + '" alt="cover" onerror="this.style.display=\'none\';this.parentNode.innerHTML=\'🎵\';">';
                            }
                        } catch (e) {}
                        
                        await new Promise(function(resolve) { setTimeout(resolve, 50); });
                    }
                }

                async function loadToplist() {
                    var dailyContainer = document.getElementById('daily-recommendations');
                    if (!dailyContainer) return;
                    
                    dailyContainer.innerHTML = '<div class="loading">加载排行榜中...</div>';
                    
                    var hotKeywords = ['热歌', '流行', '抖音', '周杰伦', '林俊杰'];
                    var randomKeyword = hotKeywords[Math.floor(Math.random() * hotKeywords.length)];
                    
                    try {
                        var apiUrl = getCurrentApiUrl();
                        var url = apiUrl + '/search?keywords=' + encodeURIComponent(randomKeyword) + '&limit=15';
                        var response = await fetch(url, { mode: 'cors' });
                        var data = await response.json();
                        
                        if (data.code === 200 && data.result && data.result.songs) {
                            renderToplist(data.result.songs);
                            fetchSongCoversForToplist(data.result.songs);
                        } else {
                            dailyContainer.innerHTML = '<div class="empty-message">暂无数据</div>';
                        }
                    } catch (e) {
                        console.log('加载排行榜失败', e);
                        dailyContainer.innerHTML = '<div class="empty-message">音乐源暂时不可用</div>';
                    }
                }

                function renderToplist(songs) {
                    var dailyContainer = document.getElementById('daily-recommendations');
                    var currentApi = MUSIC_APIS[currentApiIndex];
                    var html = '<div style="text-align:right; margin-bottom:8px;">' +
                        '<span class="api-status" onclick="switchMusicApi()" style="cursor: pointer;">当前: ' + currentApi.name + ' ↻</span>' +
                        '</div>';
                    
                    for (var i = 0; i < songs.length; i++) {
                        var song = songs[i];
                        var songId = song.id;
                        var songName = song.name;
                        var artists = '未知歌手';
                        
                        if (song.artists) {
                            var artistNames = [];
                            for (var j = 0; j < song.artists.length; j++) {
                                artistNames.push(song.artists[j].name);
                            }
                            artists = artistNames.join('/');
                        } else if (song.ar) {
                            var artistNames = [];
                            for (var j = 0; j < song.ar.length; j++) {
                                artistNames.push(song.ar[j].name);
                            }
                            artists = artistNames.join('/');
                        }
                        
                        // 歌名后面不再显示源名称
                        html += '<div class="music-item" data-source="netease" data-id="' + songId + '" data-name="' + songName.replace(/"/g, '&quot;') + '" data-artist="' + artists.replace(/"/g, '&quot;') + '">' +
                            '<div class="music-cover" data-song-id="' + songId + '" id="daily-cover-' + songId + '">' + (i + 1) + '</div>' +
                            '<div class="music-info">' +
                            '<div class="music-title">' + songName + '</div>' +
                            '<div class="music-artist">' + artists + '</div>' +
                            '</div>' +
                            '</div>';
                    }
                    dailyContainer.innerHTML = html;
                    
                    bindMusicItemEvents('#daily-recommendations .music-item');
                }

                async function fetchSongCoversForToplist(songs) {
                    for (var i = 0; i < songs.length; i++) {
                        var song = songs[i];
                        var songId = song.id;
                        var coverDiv = document.getElementById('daily-cover-' + songId);
                        if (!coverDiv) continue;
                        
                        try {
                            var apiUrl = getCurrentApiUrl();
                            var url = apiUrl + '/song/detail?ids=' + songId;
                            var response = await fetch(url, { mode: 'cors' });
                            var data = await response.json();
                            var coverUrl = '';
                            
                            if (data.songs && data.songs[0]) {
                                var songDetail = data.songs[0];
                                if (songDetail.al && songDetail.al.picUrl) {
                                    coverUrl = songDetail.al.picUrl;
                                }
                            }
                            
                            if (coverUrl) {
                                coverDiv.innerHTML = '<img src="' + coverUrl + '" alt="cover" onerror="this.style.display=\'none\';this.parentNode.innerHTML=\'🎵\';">';
                            }
                        } catch (e) {}
                        
                        await new Promise(function(resolve) { setTimeout(resolve, 50); });

                }

                function refreshToplist() { 
                    loadToplist(); 
                }

                async function playMusic(item) {
                    var source = item.dataset.source;
                    var id = item.dataset.id;
                    var name = item.dataset.name;
                    var artist = item.dataset.artist;
                    
                    if (source === 'netease') {
                        floatingPlayer.classList.add('show');
                        playerTitle.innerText = name;
                        playerArtist.innerText = artist;
                        
                        lyricsContainer.innerHTML = '<div class="no-lyric">加载歌词中...</div>';
                        
                        try {
                            var apiUrl = getCurrentApiUrl();
                            var url = apiUrl + '/song/url?id=' + id + '&br=128000';
                            var response = await fetch(url, { mode: 'cors' });
                            var data = await response.json();
                            var audioUrl = null;
                            
                            if (data.data && data.data[0] && data.data[0].url) {
                                audioUrl = data.data[0].url;
                            }
                            
                            if (audioUrl) {
                                audioPlayer.src = audioUrl;
                                
                                var lyricUrl = apiUrl + '/lyric?id=' + id;
                                var lyricResponse = await fetch(lyricUrl, { mode: 'cors' });
                                var lyricData = await lyricResponse.json();
                                
                                if (lyricData.lrc && lyricData.lrc.lyric) {
                                    var lyrics = parseLRC(lyricData.lrc.lyric);
                                    if (lyrics.length > 0) {
                                        displayLyrics(lyrics);
                                    } else {
                                        lyricsContainer.innerHTML = '<div class="no-lyric">暂无歌词</div>';
                                    }
                                } else {
                                    lyricsContainer.innerHTML = '<div class="no-lyric">暂无歌词</div>';
                                }
                                
                                audioPlayer.play().catch(function() {});
                            } else {
                                alert('无法获取播放地址');
                                lyricsContainer.innerHTML = '<div class="no-lyric">播放失败</div>';
                            }
                        } catch (e) {
                            console.log('播放失败', e);
                            alert('播放失败');
                            lyricsContainer.innerHTML = '<div class="no-lyric">播放失败</div>';
                        }
                    }
                }

                function parseLRC(lrcText) {
                    if (!lrcText) return [];
                    var lines = lrcText.split('\n');
                    var lyricList = [];
                    
                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i];
                        var match = line.match(/\[(\d{2}):(\d{2})(?:\.(\d{2,3}))?\](.*)/);
                        if (match) {
                            var minutes = parseInt(match[1]);
                            var seconds = parseInt(match[2]);
                            var milliseconds = parseInt(match[3] || '0');
                            var time = minutes * 60 + seconds + milliseconds / 1000;
                            var text = match[4].trim();
                            if (text) {
                                lyricList.push({ time: time, text: text });
                            }
                        }
                    }
                    
                    lyricList.sort(function(a, b) { return a.time - b.time; });
                    return lyricList;
                }

                function displayLyrics(lyrics) {
                    if (!lyrics || lyrics.length === 0) {
                        lyricsContainer.innerHTML = '<div class="no-lyric">暂无歌词</div>';
                        return;
                    }
                    
                    var html = '';
                    for (var i = 0; i < lyrics.length; i++) {
                        html += '<div class="lyric-line" data-time="' + lyrics[i].time + '">' + lyrics[i].text + '</div>';
                    }
                    lyricsContainer.innerHTML = html;
                    
                    var lyricLines = document.querySelectorAll('.lyric-line');
                    for (var i = 0; i < lyricLines.length; i++) {
                        lyricLines[i].addEventListener('click', function(e) {
                            var time = parseFloat(e.target.dataset.time);
                            if (!isNaN(time) && audioPlayer) {
                                audioPlayer.currentTime = time;
                                audioPlayer.play().catch(function() {});
                            }
                        });
                    }
                    
                    if (audioPlayer) {
                        audioPlayer.addEventListener('timeupdate', function() {
                            var currentTime = audioPlayer.currentTime;
                            var lines = document.querySelectorAll('.lyric-line');
                            var activeIndex = -1;
                            
                            for (var i = 0; i < lines.length; i++) {
                                var lineTime = parseFloat(lines[i].dataset.time);
                                if (lineTime <= currentTime) {
                                    activeIndex = i;
                                }
                            }
                            
                            for (var i = 0; i < lines.length; i++) {
                                lines[i].classList.remove('active', themeClass);
                            }
                            
                            if (activeIndex >= 0) {
                                lines[activeIndex].classList.add('active', themeClass);
                                
                                var scrollTop = activeIndex * 32 - lyricsContainer.clientHeight / 2 + 16;

    <!-- 智能分类规则 -->
    <script>
    (function() {
        var URL_RULES = [
            { pattern: /\.ipa$/i, platform: 'ios', category: 'apps', typeName: 'iOS应用' },
            { pattern: /\.gipa$/i, platform: 'ios', category: 'games', typeName: 'iOS游戏' },
            { pattern: /\.ipag$/i, platform: 'ios', category: 'games', typeName: 'iOS游戏' },
            { pattern: /\.apk$/i, platform: 'android', category: 'apps', typeName: 'Android应用' },
            { pattern: /\.apkg$/i, platform: 'android', category: 'games', typeName: 'Android游戏' },
            { pattern: /\.gapk$/i, platform: 'android', category: 'games', typeName: 'Android游戏' }
        ];

        window.smartParseUrl = function(url) {
            var fileName = '';
            var extension = '';
            var match = url.match(/\/([^\/]+)\.([a-zA-Z0-9]+)(?:\?.*)?$/);
            
            if (match) {
                fileName = match[1];
                extension = match[2].toLowerCase();
            } else {
                var extMatch = url.match(/\.([a-zA-Z0-9]+)(?:\?.*)?$/);
                if (extMatch) {
                    extension = extMatch[1].toLowerCase();
                    var pathMatch = url.match(/\/([^\/]+)\./);
                    if (pathMatch) fileName = pathMatch[1];
                }
            }

            var matchedRule = null;
            for (var i = 0; i < URL_RULES.length; i++) {
                if (URL_RULES[i].pattern.test('.' + extension) || URL_RULES[i].pattern.test(url)) {
                    matchedRule = URL_RULES[i];
                    break;
                }
            }

            var displayName = fileName || '';
            if (displayName) {
                displayName = displayName
                    .replace(/[-_]/g, ' ')
                    .replace(/([a-z])([A-Z])/g, '$1 $2')
                    .replace(/\b\w/g, function(l) { return l.toUpperCase(); })
                    .trim();
            }
            
            if (!displayName) {
                try {
                    var hostname = new URL(url).hostname.replace('www.', '');
                    displayName = hostname.split('.')[0];
                    displayName = displayName.charAt(0).toUpperCase() + displayName.slice(1);
                } catch (e) {
                    displayName = matchedRule ? matchedRule.typeName : '应用';
                }
            }

            return {
                name: displayName,
                extension: extension || '未知',
                platform: matchedRule ? matchedRule.platform : null,
                category: matchedRule ? matchedRule.category : null,
                typeName: matchedRule ? matchedRule.typeName : '未知类型',
                isValid: !!matchedRule
            };
        };

        function enhanceFetchButton() {
            var fetchBtn = document.getElementById('fetchInfoBtn');
            if (!fetchBtn) return;

            var originalSmartFetch = window.smartFetchFromUrl;
            
            fetchBtn.addEventListener('click', async function(e) {
                e.preventDefault();
                e.stopPropagation();

                var urlInput = document.getElementById('appUrl');
                var url = urlInput.value.trim();
                if (!url) {
                    alert('请输入下载链接');
                    return;
                }

                var statusEl = document.getElementById('fetchStatus');
                statusEl.innerText = '🔍 智能识别中...';
                fetchBtn.disabled = true;

                try {
                    var info = window.smartParseUrl(url);
                    
                    if (info.isValid) {
                        document.getElementById('appName').value = info.name;
                        document.getElementById('appPlatform').value = info.platform;
                        
                        var platformOptions = document.querySelectorAll('.platform-option');
                        for (var i = 0; i < platformOptions.length; i++) {
                            var opt = platformOptions[i];
                            opt.classList.toggle('selected', opt.dataset.platform === info.platform);
                        }
                        
                        document.getElementById('appCategory').value = info.category;
                        statusEl.innerText = '✅ 已识别: ' + info.typeName + ' (' + info.extension + ')';
                    } else {
                        statusEl.innerText = '⚠️ 未匹配规则，使用后备解析';
                        if (originalSmartFetch) {
                            var originalInfo = await originalSmartFetch(url);
                            if (originalInfo.name) {
                                document.getElementById('appName').value = originalInfo.name;
                            }
                        }
                    }
                } catch (error) {
                    console.error('解析失败', error);
                    statusEl.innerText = '❌ 解析失败';
                } finally {
                    fetchBtn.disabled = false;
                }
            });
        }

        window.batchAddApps = async function(appsList) {
            if (!appsList || !appsList.length) {
                console.log('请提供应用列表');
                return;
            }

            var currentApps = [];
            try {
                var saved = localStorage.getItem('appstore_apps_data');
                if (saved) {
                    currentApps = JSON.parse(saved);
                }
            } catch(e) {
                console.error('读取数据失败', e);
            }

            var added = 0;
            var skipped = 0;

            for (var i = 0; i < appsList.length; i++) {
                var item = appsList[i];
                var url = item.url;
                
                var exists = false;
                for (var j = 0; j < currentApps.length; j++) {
                    if (currentApps[j].url === url) {
                        exists = true;
                        break;
                    }
                }
                
                if (exists) {
                    console.log('⏭️ 已跳过: ' + url);
                    skipped++;
                    continue;
                }

                var info = window.smartParseUrl(url);
                
                if (info.isValid) {
                    var newApp = {
                        id: Date.now() + '-' + Math.random() + '-' + added,
                        name: item.name || info.name,
                        url: url,
                        platform: info.platform,
                        category: info.category
                    };
                    
                    currentApps.push(newApp);
                    console.log('✅ 已添加: ' + newApp.name + ' (' + info.typeName + ')');
                    added++;
                } else {
                    console.log('❌ 无法识别: ' + url);
                }

                await new Promise(function(r) { setTimeout(r, 10); });
            }

            if (added > 0) {
                localStorage.setItem('appstore_apps_data', JSON.stringify(currentApps));
                console.log('🎉 添加完成！新增 ' + added + ' 个，跳过 ' + skipped + ' 个');
                setTimeout(function() { location.reload(); }, 1500);
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', enhanceFetchButton);
        } else {
            enhanceFetchButton();
        }

        console.log('✅ 智能分类规则已加载');
    })();
    </script>
