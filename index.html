                // ==================== 漫画阅读器核心 ====================
                // 使用 JSZip 解析 ZIP 文件
                var ZIP_PATTERNS = [
                    /https:\/\/app-storage\.loadly\.io\/[a-f0-9]+\.zip(?:\?[^\s"']*)?/i,
                    /https:\/\/[a-z0-9]+\.loadly\.io\/[a-f0-9]+\.zip(?:\?[^\s"']*)?/i,
                    /https:\/\/[^\s"']+\.zip/i,
                    /https:\/\/[^\s"']+\.cbz/i
                ];

                async function extractZipDirectUrl(shareUrl, retry) {
                    retry = retry || 0;
                    var normalized = shareUrl.trim();
                    if (!normalized.startsWith('http')) {
                        if (normalized.startsWith('loadly.io/')) normalized = 'https://' + normalized;
                        else normalized = 'https://loadly.io/' + normalized.replace(/^\/+/, '');
                    }
                    var controller = new AbortController();
                    var timeoutId = setTimeout(function() { controller.abort(); }, 12000);
                    try {
                        var response = await fetch(normalized, {
                            signal: controller.signal,
                            headers: { 'User-Agent': 'Mozilla/5.0 (compatible; ComicLoader)' }
                        });
                        clearTimeout(timeoutId);
                        if (!response.ok) throw new Error('HTTP ' + response.status);
                        var html = await response.text();
                        for (var i = 0; i < ZIP_PATTERNS.length; i++) {
                            var match = html.match(ZIP_PATTERNS[i]);
                            if (match) return match[0];
                        }
                        var fallback = html.match(/https:\/\/[^\s"']+\.(?:zip|cbz)(?:\?[^\s"']*)?/i);
                        if (fallback) return fallback[0];
                        throw new Error('未找到ZIP直链');
                    } catch (err) {
                        clearTimeout(timeoutId);
                        if (retry < 2) {
                            await new Promise(function(r) { setTimeout(r, 800); });
                            return extractZipDirectUrl(normalized, retry + 1);
                        }
                        throw err;
                    }
                }

                // IndexedDB 缓存
                var DB_NAME = 'ComicCacheDB';
                var STORE_NAME = 'comicData';
                var DB_VERSION = 1;

                function openDB() {
                    return new Promise(function(resolve, reject) {
                        var request = indexedDB.open(DB_NAME, DB_VERSION);
                        request.onupgradeneeded = function(event) {
                            var db = event.target.result;
                            if (!db.objectStoreNames.contains(STORE_NAME)) {
                                db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                            }
                        };
                        request.onsuccess = function() { resolve(request.result); };
                        request.onerror = function() { reject(request.error); };
                    });
                }

                function getCacheKey(link) {
                    var full = link.trim();
                    if (!full.startsWith('http')) {
                        full = 'https://loadly.io/' + full.replace(/^\/+/, '');
                    }
                    return full.replace(/^https?:\/\//, '').replace(/\/.*$/, '');
                }

                async function hasCachedComic(link) {
                    try {
                        var db = await openDB();
                        var key = getCacheKey(link);
                        return new Promise(function(resolve) {
                            var tx = db.transaction(STORE_NAME, 'readonly');
                            var store = tx.objectStore(STORE_NAME);
                            var getRequest = store.get(key);
                            getRequest.onsuccess = function() { resolve(!!getRequest.result); };
                            getRequest.onerror = function() { resolve(false); };
                            tx.oncomplete = function() { db.close(); };
                        });
                    } catch { return false; }
                }

                async function getCachedComic(link) {
                    try {
                        var db = await openDB();
                        var key = getCacheKey(link);
                        return new Promise(function(resolve, reject) {
                            var tx = db.transaction(STORE_NAME, 'readonly');
                            var store = tx.objectStore(STORE_NAME);
                            var getRequest = store.get(key);
                            getRequest.onsuccess = function() { resolve(getRequest.result || null); };
                            getRequest.onerror = function() { reject(getRequest.error); };
                            tx.oncomplete = function() { db.close(); };
                        });
                    } catch { return null; }
                }

                async function saveCachedComic(link, imagesData, totalPages) {
                    try {
                        var db = await openDB();
                        var key = getCacheKey(link);
                        
                        var imageEntries = [];
                        for (var i = 0; i < imagesData.length && i < totalPages; i++) {
                            var img = imagesData[i];
                            if (img.blobUrl) {
                                try {
                                    var response = await fetch(img.blobUrl);
                                    var blob = await response.blob();
                                    var base64 = await new Promise(function(resolve) {
                                        var reader = new FileReader();
                                        reader.onload = function() { resolve(reader.result.split(',')[1]); };
                                        reader.readAsDataURL(blob);
                                    });
                                    imageEntries.push({
                                        name: img.name || 'page_' + (i+1),
                                        data: base64,
                                        type: blob.type || 'image/jpeg'
                                    });
                                } catch (e) {
                                    imageEntries.push({ name: img.name || 'page_' + (i+1), data: null, type: null });
                                }
                            } else {
                                imageEntries.push({ name: img.name || 'page_' + (i+1), data: null, type: null });
                            }
                        }

                        var cacheData = {
                            id: key,
                            total: totalPages,
                            images: imageEntries,
                            timestamp: Date.now()
                        };

                        return new Promise(function(resolve, reject) {
                            var tx = db.transaction(STORE_NAME, 'readwrite');
                            var store = tx.objectStore(STORE_NAME);
                            var putRequest = store.put(cacheData);
                            putRequest.onsuccess = function() {
                                document.getElementById('comicCacheStatus').style.display = 'block';
                                resolve();
                            };
                            putRequest.onerror = function() { reject(putRequest.error); };
                            tx.oncomplete = function() { db.close(); };
                        });
                    } catch (e) {
                        console.warn('缓存保存失败:', e);
                    }
                }

                // 漫画进度
                var COMIC_PROGRESS_KEY = 'comic_reader_progress_v4';

                function getComicProgress(link) {
                    try {
                        var data = JSON.parse(localStorage.getItem(COMIC_PROGRESS_KEY) || '{}');
                        var key = getCacheKey(link);
                        return data[key] || 0;
                    } catch { return 0; }
                }

                function saveComicProgress(link, pageIndex) {
                    try {
                        var data = JSON.parse(localStorage.getItem(COMIC_PROGRESS_KEY) || '{}');
                        var key = getCacheKey(link);
                        data[key] = pageIndex;
                        localStorage.setItem(COMIC_PROGRESS_KEY, JSON.stringify(data));
                        updateComicProgressDisplay(pageIndex);
                    } catch {}
                }

                function updateComicProgressDisplay(pageIndex) {
                    var el = document.getElementById('comicProgressIndicator');
                    if (el && comicTotalPages > 0) {
                        var pct = Math.round(((pageIndex + 1) / comicTotalPages) * 100);
                        el.textContent = pct + '%';
                        el.style.display = 'block';
                        el.style.color = pct >= 100 ? '#4CAF50' : '#ffaa55';
                    }
                }

                // 漫画状态变量
                var comicAllEntries = [];
                var comicCurrentMeta = [];
                var comicPageElements = [];
                var comicIsActive = false;
                var comicAbortSignal = null;
                var comicIsLoadingMore = false;
                var comicLoadedCount = 0;
                var comicTotalPages = 0;
                var comicZipBlobCache = null;
                var comicCurrentLink = '';
                var comicSaveTimer = null;
                var comicLastSavedPage = -1;
                var comicIsFromCache = false;
                var comicScrollWrapper = null;

                var COMIC_BATCH_SIZE = 10;
                var COMIC_TRIGGER_INDEX = 4;

                function createComicPlaceholders(count) {
                    if (!comicScrollWrapper) return;
                    comicScrollWrapper.innerHTML = '';
                    comicPageElements = [];
                    for (var i = 0; i < count; i++) {
                        var card = document.createElement('div');
                        card.className = 'comic-page-card';
                        card.setAttribute('data-index', i);
                        var placeholder = document.createElement('div');
                        placeholder.className = 'comic-loading-placeholder';
                        placeholder.innerHTML = '<div class="comic-placeholder-spinner"></div><span>' + (i+1) + '</span>';
                        card.appendChild(placeholder);
                        comicScrollWrapper.appendChild(card);
                        comicPageElements.push(card);
                    }
                }

                function setComicPageImage(index, blobUrl, name) {
                    if (!comicPageElements[index]) return;
                    var card = comicPageElements[index];
                    var existing = card.querySelector('.comic-img');
                    if (existing) {
                        existing.src = blobUrl;
                        return;
                    }
                    var img = document.createElement('img');
                    img.className = 'comic-img';
                    img.src = blobUrl;
                    img.alt = name || 'page_' + (index+1);
                    img.draggable = false;
                    card.innerHTML = '';
                    card.appendChild(img);
                }

                async function loadComicFromCache(cachedData) {
                    var images = cachedData.images;
                    comicTotalPages = cachedData.total || images.length;
                    
                    createComicPlaceholders(comicTotalPages);
                    comicCurrentMeta = [];
                    comicLoadedCount = 0;

                    var initialLoad = Math.min(COMIC_BATCH_SIZE, images.length);
                    for (var i = 0; i < initialLoad && i < comicTotalPages; i++) {
                        var imgData = images[i];
                        if (imgData.data) {
                            try {
                                var byteCharacters = atob(imgData.data);
                                var byteNumbers = new Array(byteCharacters.length);
                                for (var j = 0; j < byteCharacters.length; j++) {
                                    byteNumbers[j] = byteCharacters.charCodeAt(j);
                                }
                                var byteArray = new Uint8Array(byteNumbers);
                                var blob = new Blob([byteArray], { type: imgData.type || 'image/jpeg' });
                                var url = URL.createObjectURL(blob);
                                comicCurrentMeta[i] = {
                                    name: imgData.name || 'page_' + (i+1),
                                    blobUrl: url,
                                    loaded: true,
                                    file: null
                                };
                                comicLoadedCount++;
                                setComicPageImage(i, url, imgData.name || 'page_' + (i+1));
                            } catch (e) {
                                console.warn('恢复缓存图片失败:', i, e);
                                comicCurrentMeta[i] = {
                                    name: imgData.name || 'page_' + (i+1),
                                    blobUrl: null,
                                    loaded: false,
                                    file: null
                                };
                            }
                        } else {
                            comicCurrentMeta[i] = {
                                name: imgData.name || 'page_' + (i+1),
                                blobUrl: null,
                                loaded: false,
                                file: null
                            };
                        }
                    }

                    for (var k = initialLoad; k < comicTotalPages; k++) {
                        var imgData2 = images[k] || { name: 'page_' + (k+1) };
                        comicCurrentMeta[k] = {
                            name: imgData2.name || 'page_' + (k+1),
                            blobUrl: null,
                            loaded: false,
                            file: null
                        };
                    }

                    document.getElementById('comicCacheStatus').style.display = 'block';
                    return comicLoadedCount;
                }

                async function parseZipForImages(zipBlob) {
                    // 确保 JSZip 已加载
                    if (typeof JSZip === 'undefined') {
                        throw new Error('JSZip 库未加载，请刷新页面重试');
                    }
                    var zip = await JSZip.loadAsync(zipBlob);
                    var all = [];
                    zip.forEach(function(path, file) {
                        if (!file.dir) all.push({ path: path, file: file });
                    });
                    var exts = ['.jpg','.jpeg','.png','.gif','.webp','.bmp','.jfif'];
                    var images = all.filter(function(e) {
                        var lower = e.path.toLowerCase();
                        return exts.some(function(ext) { return lower.endsWith(ext); });
                    });
                    images.sort(function(a, b) {
                        return a.path.localeCompare(b.path, undefined, { numeric: true });
                    });
                    if (!images.length) throw new Error('未找到图片');
                    return images;
                }

                async function loadComicBatch(startIndex, count) {
                    var endIndex = Math.min(startIndex + count, comicAllEntries.length);
                    var batch = comicAllEntries.slice(startIndex, endIndex);
                    if (batch.length === 0) return;

                    if (!comicZipBlobCache) {
                        throw new Error('ZIP数据未缓存');
                    }

                    for (var idx = 0; idx < batch.length; idx++) {
                        var entry = batch[idx];
                        var globalIdx = startIndex + idx;
                        if (globalIdx >= comicCurrentMeta.length) continue;
                        if (comicCurrentMeta[globalIdx].loaded) continue;
                        try {
                            var blob = await entry.file.async('blob');
                            var url = URL.createObjectURL(blob);
                            comicCurrentMeta[globalIdx].blobUrl = url;
                            comicCurrentMeta[globalIdx].loaded = true;
                            comicLoadedCount++;
                            setComicPageImage(globalIdx, url, entry.path);
                        } catch (e) {
                            console.warn('加载失败:', globalIdx, e);
                        }
                    }
                }

                function checkComicLoadMore() {
                    if (!comicScrollWrapper || comicIsLoadingMore || comicLoadedCount >= comicAllEntries.length || !comicAllEntries.length) return;

                    var scrollTop = comicScrollWrapper.scrollTop;
                    var pageHeight = window.innerHeight;
                    var visibleIndex = Math.round(scrollTop / pageHeight);
                    
                    var loadedBatchCount = Math.ceil(comicLoadedCount / COMIC_BATCH_SIZE) * COMIC_BATCH_SIZE;
                    if (visibleIndex >= loadedBatchCount - COMIC_TRIGGER_INDEX - 1 && comicLoadedCount < comicAllEntries.length) {
                        var nextStart = comicLoadedCount;
                        var remaining = comicAllEntries.length - comicLoadedCount;
                        var toLoad = Math.min(COMIC_BATCH_SIZE, remaining);
                        if (toLoad > 0) {
                            comicIsLoadingMore = true;
                            loadComicBatch(nextStart, toLoad).finally(function() {
                                comicIsLoadingMore = false;
                                if (comicLoadedCount < comicAllEntries.length) {
                                    setTimeout(checkComicLoadMore, 300);
                                } else {
                                    if (!comicIsFromCache && comicZipBlobCache) {
                                        saveCachedComic(comicCurrentLink, comicCurrentMeta, comicTotalPages);
                                    }
                                }
                            });
                        }
                    }
                }

                function checkComicLoadMoreFromCache(cachedData) {
                    if (!comicScrollWrapper || comicIsLoadingMore || comicLoadedCount >= comicTotalPages) return;

                    var scrollTop = comicScrollWrapper.scrollTop;
                    var pageHeight = window.innerHeight;
                    var visibleIndex = Math.round(scrollTop / pageHeight);
                    
                    var loadedBatchCount = Math.ceil(comicLoadedCount / COMIC_BATCH_SIZE) * COMIC_BATCH_SIZE;
                    if (visibleIndex >= loadedBatchCount - COMIC_TRIGGER_INDEX - 1 && comicLoadedCount < comicTotalPages) {
                        var nextStart = comicLoadedCount;
                        var toLoad = Math.min(COMIC_BATCH_SIZE, comicTotalPages - comicLoadedCount);
                        if (toLoad > 0) {
                            comicIsLoadingMore = true;
                            (async function() {
                                var images = cachedData.images;
                                for (var i = nextStart; i < Math.min(nextStart + toLoad, images.length); i++) {
                                    var imgData = images[i];
                                    if (imgData && imgData.data) {
                                        try {
                                            var byteCharacters = atob(imgData.data);
                                            var byteNumbers = new Array(byteCharacters.length);
                                            for (var j = 0; j < byteCharacters.length; j++) {
                                                byteNumbers[j] = byteCharacters.charCodeAt(j);
                                            }
                                            var byteArray = new Uint8Array(byteNumbers);
                                            var blob = new Blob([byteArray], { type: imgData.type || 'image/jpeg' });
                                            var url = URL.createObjectURL(blob);
                                            comicCurrentMeta[i] = {
                                                name: imgData.name || 'page_' + (i+1),
                                                blobUrl: url,
                                                loaded: true,
                                                file: null
                                            };
                                            comicLoadedCount++;
                                            setComicPageImage(i, url, imgData.name || 'page_' + (i+1));
                                        } catch (e) {
                                            console.warn('从缓存加载失败:', i, e);
                                        }
                                    }
                                }
                                comicIsLoadingMore = false;
                                if (comicLoadedCount < comicTotalPages) {
                                    setTimeout(function() { checkComicLoadMoreFromCache(cachedData); }, 300);
                                }
                            })();
                        }
                    }
                }

                function saveComicCurrentProgress() {
                    if (!comicCurrentLink || comicTotalPages === 0) return;
                    if (comicSaveTimer) clearTimeout(comicSaveTimer);
                    comicSaveTimer = setTimeout(function() {
                        if (comicScrollWrapper) {
                            var scrollTop = comicScrollWrapper.scrollTop;
                            var pageHeight = window.innerHeight;
                            var visibleIndex = Math.round(scrollTop / pageHeight);
                            var safeIndex = Math.max(0, Math.min(visibleIndex, comicTotalPages - 1));
                            if (safeIndex !== comicLastSavedPage) {
                                saveComicProgress(comicCurrentLink, safeIndex);
                                comicLastSavedPage = safeIndex;
                            }
                        }
                        comicSaveTimer = null;
                    }, 400);
                }

                function gotoComicProgress(savedIndex) {
                    if (!comicScrollWrapper || !comicPageElements.length) return;
                    if (savedIndex > 0 && savedIndex < comicTotalPages) {
                        var target = savedIndex * window.innerHeight;
                        setTimeout(function() {
                            comicScrollWrapper.scrollTo({ top: target, behavior: 'smooth' });
                            updateComicProgressDisplay(savedIndex);
                            comicLastSavedPage = savedIndex;
                            if (savedIndex >= comicLoadedCount) {
                                var nextStart = comicLoadedCount;
                                var remaining = comicAllEntries.length - comicLoadedCount;
                                var toLoad = Math.min(COMIC_BATCH_SIZE, remaining);
                                if (toLoad > 0) {
                                    loadComicBatch(nextStart, toLoad).then(function() {
                                        setTimeout(function() {
                                            comicScrollWrapper.scrollTo({ top: target, behavior: 'smooth' });
                                        }, 200);
                                    });
                                }
                            }
                        }, 150);
                    } else {
                        setTimeout(function() {
                            comicScrollWrapper.scrollTo({ top: 0, behavior: 'instant' });
                            updateComicProgressDisplay(0);
                            comicLastSavedPage = 0;
                        }, 60);
                    }
                }

                // ---- 打开漫画 ----
                async function openComic(comic) {
                    // 检查 JSZip 是否可用
                    if (typeof JSZip === 'undefined') {
                        alert('JSZip 库未加载，请刷新页面重试');
                        return;
                    }

                    readerOverlay.style.display = 'flex';
                    readerTitle.textContent = '📖 ' + comic.name;
                    currentBookId = comic.id;
                    
                    readerContentArea.innerHTML = '<div id="comicScrollWrapper" class="comic-scroll-wrapper"></div>';
                    comicScrollWrapper = document.getElementById('comicScrollWrapper');
                    
                    comicAllEntries = [];
                    comicCurrentMeta = [];
                    comicPageElements = [];
                    comicLoadedCount = 0;
                    comicTotalPages = 0;
                    comicZipBlobCache = null;
                    comicIsLoadingMore = false;
                    comicLastSavedPage = -1;
                    comicIsFromCache = false;
                    
                    var comicUrl = comic.url.trim();
                    if (!comicUrl) {
                        comicScrollWrapper.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#555;font-size:1rem;">❌ 无效的漫画链接</div>';
                        return;
                    }
                    
                    comicCurrentLink = comicUrl;
                    var savedIndex = getComicProgress(comicCurrentLink);
                    
                    var hasCache = await hasCachedComic(comicCurrentLink);
                    
                    if (hasCache) {
                        comicIsFromCache = true;
                        try {
                            var cachedData = await getCachedComic(comicCurrentLink);
                            if (cachedData && cachedData.images && cachedData.images.length > 0) {
                                await loadComicFromCache(cachedData);
                                
                                var scrollHandler = function() {
                                    checkComicLoadMoreFromCache(cachedData);
                                    saveComicCurrentProgress();
                                };
                                comicScrollWrapper.addEventListener('scroll', scrollHandler);
                                window.__comicCleanup = function() {
                                    comicScrollWrapper.removeEventListener('scroll', scrollHandler);
                                };
                                
                                if (savedIndex > 0 && savedIndex < comicTotalPages) {
                                    gotoComicProgress(savedIndex);
                                } else {
                                    gotoComicProgress(0);
                                }
                                return;
                            }
                        } catch (err) {
                            console.error('缓存加载失败，重新下载', err);
                            comicIsFromCache = false;
                        }
                    }
                    
                    comicIsFromCache = false;
                    try {
                        var directUrl = await extractZipDirectUrl(comicCurrentLink);
                        var response = await fetch(directUrl);
                        if (!response.ok) throw new Error('下载失败 ' + response.status);
                        
                        var zipBlob = await response.blob();
                        comicZipBlobCache = zipBlob;
                        
                        comicAllEntries = await parseZipForImages(zipBlob);
                        comicTotalPages = comicAllEntries.length;
                        
                        comicCurrentMeta = comicAllEntries.map(function(e) {
                            return { 
                                name: e.path, 
                                blobUrl: null, 
                                loaded: false,
                                file: e.file 
                            };
                        });

                        createComicPlaceholders(comicTotalPages);
                        
                        var firstBatch = Math.min(COMIC_BATCH_SIZE, comicTotalPages);
                        await loadComicBatch(0, firstBatch);
                        
                        var scrollHandler2 = function() {
                            checkComicLoadMore();
                            saveComicCurrentProgress();
                        };
                        comicScrollWrapper.addEventListener('scroll', scrollHandler2);
                        window.__comicCleanup = function() {
                            comicScrollWrapper.removeEventListener('scroll', scrollHandler2);
                        };

                        if (savedIndex > 0 && savedIndex < comicTotalPages) {
                            gotoComicProgress(savedIndex);
                        } else {
                            gotoComicProgress(0);
                        }

                        setTimeout(function() {
                            saveCachedComic(comicCurrentLink, comicCurrentMeta, comicTotalPages);
                        }, 1000);

                        if (comicLoadedCount < comicTotalPages) {
                            setTimeout(checkComicLoadMore, 500);
                        }

                    } catch (err) {
                        console.error(err);
                        comicScrollWrapper.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#ff6666;font-size:1rem;padding:20px;text-align:center;">❌ 加载失败<br><span style="font-size:0.8rem;color:#888;">' + escapeHtml(err.message || '请检查链接') + '</span></div>';
                    }
                }

                // ==================== 统一渲染 ====================
                function renderGrid() {

                    var filtered = apps.filter(function(a) {

                }

                function performSearch(kw) {
                    currentSearchKeyword = kw;
                    if (currentCategory === 'movies') renderMoviesGrid(kw);
                    else if (currentCategory === 'music') {
                        if (kw && kw.trim() !== '') {
                            performSearchMusic(kw);
                        } else {
                            var dailyDiv = document.getElementById('daily-recommendations');
                            var container = document.getElementById('music-results-container');
                            var refreshBtn = document.getElementById('refreshDailyBtn');
                            if (dailyDiv) dailyDiv.style.display = 'block';
                            if (container) container.style.display = 'none';
                            if (refreshBtn) refreshBtn.classList.remove('hidden');
                        }
                    }
                    else if (currentCategory === 'books') {
                        if (txtBooksLoaded && comicBooksLoaded) renderBooksGrid(kw);
                        else Promise.all([loadTxtBooks(), loadComicBooks()]).then(function() { renderBooksGrid(kw); });
                    }
                    else { renderGrid(); }
                }

                function resetToHome() {
                    currentSearchKeyword = '';
                    searchInput.value = '';
                    if (currentCategory === 'music') {
                        var dailyDiv = document.getElementById('daily-recommendations');
                        var container = document.getElementById('music-results-container');
                        var refreshBtn = document.getElementById('refreshDailyBtn');
                        if (dailyDiv) dailyDiv.style.display = 'block';
                        if (container) container.style.display = 'none';
                        if (refreshBtn) refreshBtn.classList.remove('hidden');
                    }
                    renderGrid();
                }

                searchInput?.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        var kw = searchInput.value.trim();
                        if (kw) performSearch(kw);
                        else resetToHome();
                    }
                });
                searchCancelBtn?.addEventListener('click', resetToHome);
                
                navItems.forEach(function(item) {
                    item.addEventListener('click', function() {
                        currentCategory = this.dataset.cat;
                        currentSearchKeyword = '';
                        searchInput.value = '';
                        navItems.forEach(function(i) {
                            i.classList.remove('active', 'ios-theme', 'android-theme');
                        });
                        this.classList.add('active', themeClass);
                        resetBatchManager();
                        renderGrid();
                    });
                });

                // ==================== 游戏 ====================
                var gameOverlay = document.getElementById('gameOverlay');
                document.getElementById('closeGameBtn')?.addEventListener('click', function() {
                    gameOverlay.classList.remove('show');
                });
                var clickCount = 0;
                logo.addEventListener('click', function() {
                    clickCount++;
                    if (clickCount >= 5) {
                        clickCount = 0;
                        gameOverlay.classList.add('show');
                    }
                });

                // ==================== 阅读器关闭 ====================
                function onExitReader() {
                    if (window.__comicCleanup) {
                        window.__comicCleanup();
                        window.__comicCleanup = null;
                    }
                    if (window.currentCleanup) {
                        window.currentCleanup();
                        window.currentCleanup = null;
                    }
                    readerOverlay.style.display = 'none';
                    readerContentArea.innerHTML = '';
                    cancelDownload = true;
                    currentBookId = null;
                    clearTimeout(saveTimeout);
                    if (comicSaveTimer) clearTimeout(comicSaveTimer);
                    comicScrollWrapper = null;
                    document.getElementById('comicProgressIndicator').style.display = 'none';
                    document.getElementById('comicCacheStatus').style.display = 'none';
                }
                closeReaderBtn.addEventListener('click', onExitReader);

                // ==================== 启动 ====================
                applyTheme();
                loadMovieData().then(function() {
                    return loadAppsFromData();
                }).then(function() {
                    return Promise.all([loadTxtBooks(), loadComicBooks()]);
                }).then(function() {
                    mergeUserApps();
                    renderGrid();
                });

                var downloadOverlay = document.getElementById('downloadOverlay');
                var downloadIframe = document.getElementById('downloadIframe');
                var closeDownload = document.getElementById('closeDownload');
                if (closeDownload) {
                    closeDownload.addEventListener('click', function() {
                        downloadOverlay.style.display = 'none';
                        downloadIframe.src = 'about:blank';
                    });
                }

                function escapeHtml(str) {
                    if (!str) return '';
                    return str.replace(/[&<>]/g, function(m) {
                        if (m === '&') return '&amp;';
                        if (m === '<') return '&lt;';
                        if (m === '>') return '&gt;';
                        return m;
                    });
                }

                window.playSong = playSong;
                window.openComic = openComic;
                window.openBook = openBook;
            }
        })();
    </script>
    <script>
        (function() {
            var URL_RULES = [
                { pattern: /\.ipa$/i, platform: 'ios', category: 'apps' },
                { pattern: /\.gipa$/i, platform: 'ios', category: 'games' },
                { pattern: /\.apk$/i, platform: 'android', category: 'apps' },
                { pattern: /\.apkg$/i, platform: 'android', category: 'games' }
            ];
            window.smartParseUrl = function(url) {
                var ext = (url.match(/\.([a-z0-9]+)(?:[?#]|$)/i) || [])[1] || '';
                var rule = URL_RULES.find(function(r) { return r.pattern.test('.' + ext); });
                return { isValid: !!rule, platform: rule?.platform, category: rule?.category };
            };
        })();
    </script>
