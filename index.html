                        html += '<div class="app-url-preview">' + escapeHtml(app.url) + '</div>';
                        html += '<span class="download-badge ' + (app.platform === 'android' ? 'android-theme' : 'ios-theme') + '" data-url="' + app.url + '">📥 获取</span>';
                        html += '</div></div>';
                    });
                    grid.innerHTML = html;

                    document.querySelectorAll('.download-badge').forEach(function(badge) {
                        badge.addEventListener('click', function(e) {
                            e.stopPropagation();
                            var url = this.dataset.url;
                            openDownload(url);
                        });
                    });

                    // 添加游戏入口
                    html += '<div class="section-header" style="margin-top:16px;"><div class="section-title">🎮 内置小游戏</div></div>';
                    html += '<div class="movie-card" id="gameLauncher"><div class="movie-title">🦖 像素冲刺</div></div>';
                    grid.innerHTML = html;
                    document.getElementById('gameLauncher').addEventListener('click', function() {
                        document.getElementById('gameOverlay').classList.add('show');
                        startGame();
                    });
                }

                function renderMoviesGrid() {
                    var grid = document.getElementById('appsGrid');
                    if (movieData.length === 0) {
                        grid.innerHTML = '<div class="empty-message">🎬 暂无电影数据，请确保 movie.js 存在</div>';
                        return;
                    }
                    var html = '';
                    movieData.forEach(function(movie) {
                        html += '<div class="movie-card" data-id="' + movie.id + '" data-title="' + escapeHtml(movie.title) + '" data-url="' + movie.url + '" data-episodes="' + (movie.episodes ? JSON.stringify(movie.episodes).replace(/"/g, '&quot;') : '') + '">';
                        html += '<div class="movie-title">🎬 ' + escapeHtml(movie.title) + '</div>';
                        html += '</div>';
                    });
                    grid.innerHTML = html;

                    document.querySelectorAll('.movie-card').forEach(function(card) {
                        card.addEventListener('click', function() {
                            var title = this.dataset.title;
                            var url = this.dataset.url;
                            var episodes = this.dataset.episodes ? JSON.parse(this.dataset.episodes) : null;
                            openMoviePlayer(title, url, episodes);
                        });
                    });
                }

                // ==================== 电影播放器 ====================
                var movieOverlay = document.getElementById('moviePlayerOverlay');
                var movieVideo = document.getElementById('movieVideo');
                var moviePlayerTitle = document.getElementById('moviePlayerTitle');
                var movieEpisodesArea = document.getElementById('movieEpisodesArea');
                var movieEpisodesGrid = document.getElementById('movieEpisodesGrid');
                var closeMovieBtn = document.getElementById('closeMovieBtn');
                var currentMovieEpisodes = null;
                var currentMovieTitle = '';

                async function openMoviePlayer(title, url, episodes) {
                    currentMovieTitle = title;
                    currentMovieEpisodes = episodes;
                    moviePlayerTitle.textContent = title || '视频播放器';
                    movieOverlay.style.display = 'flex';
                    document.body.style.overflow = 'hidden';

                    if (episodes && episodes.length > 0) {
                        movieEpisodesArea.style.display = 'block';
                        movieEpisodesGrid.innerHTML = '';
                        episodes.forEach(function(ep, index) {
                            var btn = document.createElement('button');
                            btn.className = 'movie-episode-btn ' + themeClass;
                            btn.textContent = '第' + (index + 1) + '集';
                            btn.addEventListener('click', function() {
                                playMovieVideo(ep.url, ep.label || '第' + (index + 1) + '集');
                            });
                            movieEpisodesGrid.appendChild(btn);
                        });
                        // 默认播放第一集
                        if (episodes.length > 0) {
                            playMovieVideo(episodes[0].url, episodes[0].label || '第1集');
                        }
                    } else {
                        movieEpisodesArea.style.display = 'none';
                        playMovieVideo(url, '');
                    }
                }

                async function playMovieVideo(videoUrl, label) {
                    try {
                        movieVideo.poster = '';
                        movieVideo.src = '';
                        movieVideo.load();
                        
                        // 如果是loadly链接，提取直链
                        var finalUrl = videoUrl;
                        if (videoUrl.includes('loadly.io')) {
                            var fullUrl = videoUrl.startsWith('http') ? videoUrl : 'https://loadly.io/' + videoUrl.replace(/^\/+/, '');
                            var response = await fetch(fullUrl);
                            var html = await response.text();
                            var videoMatch = html.match(/https:\/\/[^\s"']+\.(mp4|m3u8|webm)[^\s"']*/i);
                            if (videoMatch) {
                                finalUrl = videoMatch[0];
                            }
                        }
                        
                        movieVideo.src = finalUrl;
                        movieVideo.load();
                        movieVideo.play().catch(function() {});
                        
                        if (label) {
                            moviePlayerTitle.textContent = currentMovieTitle + ' - ' + label;
                        } else {
                            moviePlayerTitle.textContent = currentMovieTitle;
                        }
                    } catch (error) {
                        console.error('播放失败:', error);
                        moviePlayerTitle.textContent = '❌ 播放失败: ' + error.message;
                    }
                }

                function closeMoviePlayer() {
                    movieOverlay.style.display = 'none';
                    document.body.style.overflow = '';
                    movieVideo.pause();
                    movieVideo.src = '';
                    movieVideo.load();
                }
                closeMovieBtn.addEventListener('click', closeMoviePlayer);

                // ==================== 下载功能 ====================
                var downloadOverlay = document.getElementById('downloadOverlay');
                var downloadIframe = document.getElementById('downloadIframe');
                var closeDownload = document.getElementById('closeDownload');

                function openDownload(url) {
                    downloadIframe.src = url;
                    downloadOverlay.style.display = 'flex';
                    document.body.style.overflow = 'hidden';
                }
                closeDownload.addEventListener('click', function() {
                    downloadOverlay.style.display = 'none';
                    document.body.style.overflow = '';
                    downloadIframe.src = 'about:blank';
                });

                // ==================== 导航切换 ====================
                var navItems = document.querySelectorAll('.nav-item');
                var searchInput = document.getElementById('searchInput');
                var searchCancelBtn = document.getElementById('searchCancelBtn');
                var currentCategory = 'apps';
                var currentSearchKeyword = '';

                function switchCategory(category) {
                    currentCategory = category;
                    currentSearchKeyword = '';
                    searchInput.value = '';
                    document.querySelectorAll('.nav-item').forEach(function(item) {
                        item.classList.remove('active', 'ios-theme', 'android-theme');
                        if (item.dataset.cat === category) {
                            item.classList.add('active', themeClass);
                        }
                    });
                    renderCategory(category);
                }

                function renderCategory(category) {
                    var grid = document.getElementById('appsGrid');
                    // 隐藏音乐搜索容器
                    var musicContainer = document.getElementById('music-results-container');
                    if (musicContainer) musicContainer.style.display = 'none';
                    
                    switch(category) {
                        case 'apps':
                            renderAppsGrid();
                            break;
                        case 'games':
                            renderGamesGrid();
                            break;
                        case 'movies':
                            renderMoviesGrid();
                            break;
                        case 'music':
                            renderMusicGrid();
                            break;
                        case 'books':
                            renderBooksGrid();
                            break;
                        default:
                            grid.innerHTML = '<div class="empty-message">📭 未知分类</div>';
                    }
                }

                navItems.forEach(function(item) {
                    item.addEventListener('click', function() {
                        var cat = this.dataset.cat;
                        switchCategory(cat);
                    });
                });

                // ==================== 搜索功能 ====================
                searchInput.addEventListener('input', function() {
                    var keyword = this.value.trim();
                    currentSearchKeyword = keyword;
                    
                    if (currentCategory === 'music') {
                        performSearchMusic(keyword);
                        return;
                    }
                    
                    // 其他分区的搜索
                    var cards = document.querySelectorAll('.app-card, .book-card, .movie-card');
                    if (!keyword) {
                        cards.forEach(function(c) { c.style.display = ''; });
                        return;
                    }
                    var lower = keyword.toLowerCase();
                    cards.forEach(function(c) {
                        var text = c.textContent.toLowerCase();
                        c.style.display = text.includes(lower) ? '' : 'none';
                    });
                });

                searchCancelBtn.addEventListener('click', function() {
                    searchInput.value = '';
                    currentSearchKeyword = '';
                    searchInput.dispatchEvent(new Event('input'));
                });

                // ==================== 工具函数 ====================
                function escapeHtml(text) {
                    if (!text) return '';
                    var div = document.createElement('div');
                    div.textContent = text;
                    return div.innerHTML;
                }

                // ==================== 游戏 ====================
                var gameCanvas = document.getElementById('gameCanvas');
                var gameCtx = gameCanvas.getContext('2d');
                var gameRunning = false;
                var gameLoopId = null;

                function startGame() {
                    if (gameRunning) return;
                    gameRunning = true;
                    var canvas = gameCanvas;
                    var ctx = gameCtx;
                    var W = 800, H = 300;
                    
                    var dino = { x: 50, y: H - 60, w: 30, h: 30, vy: 0, gravity: 0.6, jumpPower: -12, grounded: true };
                    var obstacles = [];
                    var score = 0;
                    var speed = 6;
                    var frame = 0;

                    function jump() {
                        if (dino.grounded) {
                            dino.vy = dino.jumpPower;
                            dino.grounded = false;
                        }
                    }

                    function update() {
                        dino.vy += dino.gravity;
                        dino.y += dino.vy;
                        if (dino.y >= H - 60) {
                            dino.y = H - 60;
                            dino.vy = 0;
                            dino.grounded = true;
                        }

                        if (frame % 100 === 0) {
                            var type = Math.random() > 0.6 ? 'bird' : 'cactus';
                            var h = type === 'bird' ? 20 : 30;
                            var y = type === 'bird' ? H - 80 - Math.random() * 30 : H - 60;
                            obstacles.push({ x: W, y: y, w: 20, h: h, type: type });
                        }
                        frame++;

                        for (var i = obstacles.length - 1; i >= 0; i--) {
                            var obs = obstacles[i];
                            obs.x -= speed;
                            if (obs.x + obs.w < 0) {
                                obstacles.splice(i, 1);
                                score++;
                                if (score % 5 === 0) speed += 0.5;
                                continue;
                            }
                            // 碰撞检测
                            if (dino.x < obs.x + obs.w && dino.x + dino.w > obs.x &&
                                dino.y < obs.y + obs.h && dino.y + dino.h > obs.y) {
                                gameOver();
                                return;
                            }
                        }
                    }

                    function draw() {
                        ctx.clearRect(0, 0, W, H);
                        
                        // 地面
                        ctx.fillStyle = '#555';
                        ctx.fillRect(0, H - 10, W, 10);
                        
                        // 恐龙
                        ctx.fillStyle = '#4CAF50';
                        ctx.fillRect(dino.x, dino.y, dino.w, dino.h);
                        ctx.fillStyle = '#388E3C';
                        ctx.fillRect(dino.x + 5, dino.y - 5, 6, 6);
                        ctx.fillRect(dino.x + 18, dino.y - 5, 6, 6);
                        
                        // 障碍物
                        obstacles.forEach(function(obs) {
                            if (obs.type === 'bird') {
                                ctx.fillStyle = '#E53935';
                                ctx.beginPath();
                                ctx.arc(obs.x + 10, obs.y + 10, 10, 0, Math.PI * 2);
                                ctx.fill();
                            } else {
                                ctx.fillStyle = '#8D6E63';
                                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                                ctx.fillStyle = '#5D4037';
                                ctx.fillRect(obs.x + 5, obs.y - 5, 4, 5);
                                ctx.fillRect(obs.x + 11, obs.y - 5, 4, 5);
                            }
                        });
                        
                        // 分数
                        ctx.fillStyle = '#fff';
                        ctx.font = '18px Arial';
                        ctx.fillText('分数: ' + score, 700, 30);
                    }

                    function gameOver() {
                        ctx.fillStyle = 'rgba(0,0,0,0.7)';
                        ctx.fillRect(0, 0, W, H);
                        ctx.fillStyle = '#fff';
                        ctx.font = '36px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText('游戏结束', W/2, H/2 - 20);
                        ctx.font = '18px Arial';
                        ctx.fillText('得分: ' + score + '  点击重新开始', W/2, H/2 + 30);
                        gameRunning = false;
                        if (gameLoopId) cancelAnimationFrame(gameLoopId);
                    }

                    function loop() {
                        if (!gameRunning) return;
                        update();
                        draw();
                        gameLoopId = requestAnimationFrame(loop);
                    }

                    // 事件绑定
                    function onGameKey(e) {
                        if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') {
                            e.preventDefault();
                            if (!gameRunning) {
                                resetGame();
                                return;
                            }
                            jump();
                        }
                    }
                    document.addEventListener('keydown', onGameKey);
                    canvas.addEventListener('click', function() {
                        if (!gameRunning) {
                            resetGame();
                            return;
                        }
                        jump();
                    });

                    function resetGame() {
                        dino.y = H - 60;
                        dino.vy = 0;
                        dino.grounded = true;
                        obstacles = [];
                        score = 0;
                        speed = 6;
                        frame = 0;
                        gameRunning = true;
                        if (gameLoopId) cancelAnimationFrame(gameLoopId);
                        loop();
                    }

                    // 存储清理函数
                    window.__gameCleanup = function() {
                        document.removeEventListener('keydown', onGameKey);
                        if (gameLoopId) cancelAnimationFrame(gameLoopId);
                        gameRunning = false;
                    };

                    loop();
                }

                // 关闭游戏
                document.getElementById('closeGameBtn').addEventListener('click', function() {
                    document.getElementById('gameOverlay').classList.remove('show');
                    if (window.__gameCleanup) {
                        window.__gameCleanup();
                    }
                    gameRunning = false;
                    if (gameLoopId) cancelAnimationFrame(gameLoopId);
                });

                // ==================== 初始化 ====================
                applyTheme();

                // 加载所有数据
                Promise.all([
                    loadAppsFromData(),
                    loadTxtBooks(),
                    loadComicBooks(),
                    loadMovieData()
                ]).then(function() {
                    mergeUserApps();
                    // 默认显示应用
                    renderCategory('apps');
                }).catch(function(e) {
                    console.warn('加载数据时出错:', e);
                    document.getElementById('appsGrid').innerHTML = '<div class="empty-message">⚠️ 加载数据失败，请检查网络或文件</div>';
                });

                // 自动加载漫画缓存检测 (后台)
                setTimeout(function() {
                    var defaultUrl = comicUrlInput.value.trim();
                    if (defaultUrl) {
                        hasCachedComic(defaultUrl).then(function(has) {
                            if (has) {
                                var saved = getComicProgress(defaultUrl);
                                comicCacheStatus.style.display = 'block';
                                comicCacheStatus.textContent = '💾 已缓存' + (saved > 0 ? ' · 进度' + (saved+1) + '页' : '');
                            }
                        });
                    }
                }, 1000);

                // ==================== Logo点击切换主题 ====================
                var logoIcon = document.getElementById('logoIcon');
                logoIcon.addEventListener('click', function() {
                    var current = deviceType;
                    if (current === 'ios') {
                        deviceType = 'android';
                        themeClass = 'android-theme';
                    } else {
                        deviceType = 'ios';
                        themeClass = 'ios-theme';
                    }
                    // 重新应用主题
                    applyTheme();
                    // 刷新当前页面以更新所有样式
                    renderCategory(currentCategory);
                });

                console.log('APP store 已启动，设备类型:', deviceType);
            }
        })();
    </script>
</body>
</html>
