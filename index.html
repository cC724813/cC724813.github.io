        .app-icon {

        .download-badge {

            font-weight: 600;

            transform: scale(0.96);
        }

        /* 全屏覆盖层 - 用于下载 */
        .fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }
        .fullscreen-overlay iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        .float-close {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1001;
            font-size: 24px;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s;
        }
        .float-close.ios-theme {
            background: rgba(30, 136, 229, 0.8);

        .float-close.android-theme {
            background: rgba(76, 175, 80, 0.8);
        }
        .float-close:active {
            transform: scale(0.95);

        }

        /* 音乐样式（原样保留） */
        .music-section { width: 100%; }
        .daily-header {
            display: -webkit-flex;
            display: flex;
            -webkit-align-items: center;
            align-items: center;
            -webkit-justify-content: space-between;
            justify-content: space-between;
            margin: 16px 0 12px;
        }
        .daily-title {
            font-size: 18px;
            font-weight: 600;
            display: -webkit-flex;
            display: flex;
            -webkit-align-items: center;
            align-items: center;
            gap: 8px;
            color: #fff;
        }
        .refresh-daily {
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: #aaa;
            font-size: 13px;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            display: -webkit-flex;
            display: flex;
            -webkit-align-items: center;
            align-items: center;
            gap: 4px;
        }
        .refresh-daily:active {
            background: #3a3a3c;
            color: white;
        }
        .music-item {
            background: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            display: -webkit-flex;
            display: flex;
            -webkit-align-items: center;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .music-item:active {
            background: #2c2c2e;
            -webkit-transform: scale(0.99);
            transform: scale(0.99);
        }
        .music-cover {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: #2c2c2e;
            display: -webkit-flex;
            display: flex;
            -webkit-align-items: center;
            align-items: center;
            -webkit-justify-content: center;
            justify-content: center;
            font-size: 30px;
            color: #888;
            overflow: hidden;
            -webkit-flex-shrink: 0;
            flex-shrink: 0;
        }
        .music-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .music-info {
            -webkit-flex: 1;
            flex: 1;
            min-width: 0;
        }
        .music-title {
            font-size: 16px;
            font-weight: 600;
            color: white;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .music-artist {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .music-album {
            font-size: 11px;
            color: #555;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .api-status {
            font-size: 11px;
            color: #888;
            margin-left: 8px;
            padding: 2px 8px;
            background: #2c2c2e;

        .loading {
            text-align: center;

            border: 1px solid #2c2c2e;

        .empty-message {
            text-align: center;
            padding: 40px 20px;
            color: #555;
            background: #1c1c1e;
            border-radius: 16px;
            border: 2px dashed #2c2c2e;
            margin-top: 20px;
            font-size: 15px;
        }
        .pagination {
            display: -webkit-flex;
            display: flex;
            -webkit-justify-content: center;
            justify-content: center;
            -webkit-align-items: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;

            background: #1c1c1e;
            border: 1px solid #2c2c2e;

        .page-btn {

            border: none;
            color: #888;
            font-size: 14px;

            border-radius: 30px;

            transition: all 0.2s;
        }
        .page-btn.active { background: #1e88e5; color: white; }
        .page-btn:active { background: #2c2c2e; }
        .page-info { color: #888; font-size: 14px; }
        
        /* 浮动播放器（原样保留） */
        .floating-player {
            position: fixed;
            bottom: 90px;
            left: 50%;
            -webkit-transform: translateX(-50%);
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 400px;
            background: rgba(28, 28, 30, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 12px;
            z-index: 150;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            display: none;
        }
        .floating-player.show { display: block; }
        .player-header {
            display: -webkit-flex;
            display: flex;
            -webkit-justify-content: space-between;
            justify-content: space-between;
            -webkit-align-items: center;
            align-items: center;
            margin-bottom: 8px;
        }
        .now-playing-info { -webkit-flex: 1; flex: 1; }
        .now-playing-title { font-size: 14px; font-weight: 600; color: white; }
        .now-playing-artist { font-size: 11px; color: #888; }
        .close-player {
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 20px;
            cursor: pointer;
            padding: 0 8px;
        }
        .lyrics-scroll-container {
            height: 96px;
            overflow-y: auto;
            margin: 6px 0 8px;
            padding: 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid #3a3a3c;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            line-height: 32px;
        }
        .lyric-line {
            text-align: center;
            padding: 0;
            color: #aaa;
            font-size: 12px;
            transition: all 0.2s;
            line-height: 32px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            height: 32px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .lyric-line.active.ios-theme { color: #1e88e5; font-size: 14px; font-weight: 600; }
        .lyric-line.active.android-theme { color: #4CAF50; font-size: 14px; font-weight: 600; }
        .audio-wrapper audio { width: 100%; height: 40px; border-radius: 20px; background: #2c2c2e; }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 16px;
            left: 50%;
            -webkit-transform: translateX(-50%);
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 360px;
            background: rgba(28, 28, 30, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            display: -webkit-flex;
            display: flex;
            -webkit-justify-content: space-evenly;
            justify-content: space-evenly;
            -webkit-align-items: center;
            align-items: center;
            padding: 6px 4px;
            z-index: 100;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.8);
        }
        .nav-item {
            display: -webkit-flex;
            display: flex;
            -webkit-flex-direction: column;
            flex-direction: column;
            -webkit-align-items: center;
            align-items: center;
            -webkit-justify-content: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: #8e8e93;
            font-size: 11px;
            font-weight: 500;
            padding: 6px 0;
            border-radius: 30px;
            cursor: pointer;

        .nav-item.active.android-theme { background: rgba(76, 175, 80, 0.2); }
        .nav-item i { font-size: 20px; font-style: normal; }
        
        /* 游戏覆盖层 */
        .game-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000;
            z-index: 1000;
            display: none;
            -webkit-flex-direction: column;
            flex-direction: column;
            -webkit-align-items: center;
            align-items: center;
            -webkit-justify-content: center;
            justify-content: center;
            padding: 20px;
            touch-action: none;
        }
        .game-overlay.show { display: -webkit-flex; display: flex; }
        .game-header {
            width: 100%;
            max-width: 800px;
            display: -webkit-flex;
            display: flex;
            -webkit-justify-content: space-between;
            justify-content: space-between;
            -webkit-align-items: center;
            align-items: center;
            background: #1e1e1e;
            padding: 12px 24px;
            border-radius: 60px;
            margin-bottom: 16px;
            border: 1px solid #3a3a3c;
        }
        .game-title { color: #ffd966; font-size: 1.8rem; font-weight: bold; letter-spacing: 2px; }
        .game-close { background: #3a3a3c; border: none; color: white; font-size: 32px; width: 60px; height: 60px; border-radius: 40px; cursor: pointer; line-height: 1; }
        .game-canvas-wrapper {
            background: #1a2a32;
            border-radius: 28px;
            border: 3px solid #2c3e50;
            overflow: hidden;
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 800 / 300;
        }
        canvas { display: block; width: 100%; height: 100%; image-rendering: crisp-edges; background: #fefefe; }
        
        .book-search-highlight {
            background: #e67e22;
            color: white;
            border-radius: 4px;
            padding: 0 2px;
        }
        .version-toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            -webkit-transform: translateX(-50%);
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 16px;
            z-index: 300;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            border: 1px solid #555;
        }
        .version-toast.show { opacity: 1; }

        /* 上下滑动阅读器（图书分区专用） */
        .reader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fefcf8;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }
        .reader-header {
            background: #2c3e2f;
            color: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 30;
        }
        .reader-back {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: 500;

            color: white;

            border-radius: 30px;

                <div class="logo-text">APP store</div>
            </div>
        </div>

        <div class="search-bar" id="searchBar">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="搜索当前分区..." autocomplete="off">
            <button class="search-cancel" id="searchCancelBtn">取消</button>
        </div>

        <div class="apps-grid" id="appsGrid"></div>
    </div>

                            if (typeof APPS_LIST !== 'undefined') {
                                apps = APPS_LIST.map(function(item) {
                                    return {
                                        id: item.i,
                                        name: item.n,
                                        url: 'https://loadly.io/' + item.u,
                                        platform: item.p === 'i' ? 'ios' : 'android',
                                        category: item.c === 'a' ? 'apps' : 'games'
                                    };
                                });

                            }
                            resolve();
                        };

                    });

                function loadTxtBooks() {
                    return new Promise(function(resolve) {
                        if (txtBooksLoaded) { resolve(); return; }

                        script.src = 'txt.js';
                        script.onload = function() {

                // 合并用户添加的应用

                    try {

                            if (Array.isArray(parsed) && parsed.length) {

                async function searchMusic(keyword, page) {
                    if (!keyword) return;
                    var container = document.getElementById('music-results-container');

                    container.style.display = 'block';
                    container.classList.add('has-results');

                        var apiUrl = getCurrentApiUrl();

                        var response = await fetch(url, { mode: 'cors' });
                        var data = await response.json();
                        if (data.code === 200 && data.result && data.result.songs) {
                            renderMusicResults(data.result.songs, keyword, page, data.result.songCount || 100);
                            fetchSongCovers(data.result.songs);

                        }

                        container.innerHTML = '<div class="empty-message">音乐源暂时不可用</div>';

                            artists = artistNames.join('/');
                        } else if (song.ar) {
                            var artistNames = [];
                            for (var j = 0; j < song.ar.length; j++) artistNames.push(song.ar[j].name);
                            artists = artistNames.join('/');
                        }
                        var album = '未知专辑';

                        else if (song.al) album = song.al.name;

                            '<div class="music-title">' + songName + '</div>' +
                            '<div class="music-artist">' + artists + '</div>' +
                            '<div class="music-album">' + album + '</div>' +
                            '</div>' +
                            '</div>';

                        html += '<div class="pagination">' +

                            '<span class="page-info">第 ' + page + ' 页</span>' +
                            '<button class="page-btn" id="music-next-page"' + (songs.length < 10 ? ' disabled' : '') + '>下一页 →</button>' +

                    container.innerHTML = html;

                    var next = document.getElementById('music-next-page');
                    if (prev) prev.addEventListener('click', function() { if (page > 1) searchMusic(keyword, page - 1); });
                    if (next) next.addEventListener('click', function() { if (songs.length >= 10) searchMusic(keyword, page + 1); });

                async function fetchSongCovers(songs) {
                    for (var i = 0; i < songs.length; i++) {

                async function playMusic(item) {
                    var source = item.dataset.source;
                    var id = item.dataset.id;
                    var name = item.dataset.name;
                    var artist = item.dataset.artist;
                    if (source === 'netease') {
                        var floatingPlayer = document.getElementById('floatingPlayer');
                        var audioPlayer = document.getElementById('audioPlayer');
                        var playerTitle = document.getElementById('playerTitle');
                        var playerArtist = document.getElementById('playerArtist');
                        var lyricsContainer = document.getElementById('lyricsContainer');
                        floatingPlayer.classList.add('show');
                        playerTitle.innerText = name;
                        playerArtist.innerText = artist;
                        lyricsContainer.innerHTML = '<div class="no-lyric">加载歌词中...</div>';
                        try {
                            var apiUrl = getCurrentApiUrl();
                            var url = apiUrl + '/song/url?id=' + id + '&br=128000';
                            var response = await fetch(url, { mode: 'cors' });
                            var data = await response.json();
                            var audioUrl = null;
                            if (data.data && data.data[0] && data.data[0].url) audioUrl = data.data[0].url;
                            if (audioUrl) {
                                audioPlayer.src = audioUrl;
                                var lyricUrl = apiUrl + '/lyric?id=' + id;
                                var lyricResponse = await fetch(lyricUrl, { mode: 'cors' });
                                var lyricData = await lyricResponse.json();
                                if (lyricData.lrc && lyricData.lrc.lyric) {
                                    var lyrics = parseLRC(lyricData.lrc.lyric);
                                    if (lyrics.length > 0) displayLyrics(lyrics);
                                    else lyricsContainer.innerHTML = '<div class="no-lyric">暂无歌词</div>';
                                } else {
                                    lyricsContainer.innerHTML = '<div class="no-lyric">暂无歌词</div>';
                                }
                                audioPlayer.play().catch(function() {});
                            } else {
                                alert('无法获取播放地址');
                                lyricsContainer.innerHTML = '<div class="no-lyric">播放失败</div>';
                            }
                        } catch (e) {
                            alert('播放失败');
                            lyricsContainer.innerHTML = '<div class="no-lyric">播放失败</div>';
                        }
                    }
                }

                function parseLRC(lrcText) {
                    if (!lrcText) return [];
                    var lines = lrcText.split('\n');
                    var lyricList = [];
                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i];
                        var match = line.match(/\[(\d{2}):(\d{2})(?:\.(\d{2,3}))?\](.*)/);
                        if (match) {
                            var minutes = parseInt(match[1]);
                            var seconds = parseInt(match[2]);
                            var milliseconds = parseInt(match[3] || '0');
                            var time = minutes * 60 + seconds + milliseconds / 1000;
                            var text = match[4].trim();
                            if (text) lyricList.push({ time: time, text: text });
                        }
                    }
                    lyricList.sort(function(a, b) { return a.time - b.time; });
                    return lyricList;
                }

                function displayLyrics(lyrics) {
                    var lyricsContainer = document.getElementById('lyricsContainer');
                    var audioPlayer = document.getElementById('audioPlayer');
                    if (!lyrics || lyrics.length === 0) {
                        lyricsContainer.innerHTML = '<div class="no-lyric">暂无歌词</div>';
                        return;
                    }
                    var html = '';
                    for (var i = 0; i < lyrics.length; i++) html += '<div class="lyric-line" data-time="' + lyrics[i].time + '">' + lyrics[i].text + '</div>';
                    lyricsContainer.innerHTML = html;
                    var lyricLines = document.querySelectorAll('.lyric-line');
                    for (var i = 0; i < lyricLines.length; i++) {
                        lyricLines[i].addEventListener('click', function(e) {
                            var time = parseFloat(e.target.dataset.time);
                            if (!isNaN(time) && audioPlayer) {
                                audioPlayer.currentTime = time;
                                audioPlayer.play().catch(function() {});
                            }
                        });
                    }
                    if (audioPlayer) {
                        audioPlayer.addEventListener('timeupdate', function() {
                            var currentTime = audioPlayer.currentTime;
                            var lines = document.querySelectorAll('.lyric-line');
                            var activeIndex = -1;
                            for (var i = 0; i < lines.length; i++) {
                                var lineTime = parseFloat(lines[i].dataset.time);
                                if (lineTime <= currentTime) activeIndex = i;
                            }
                            for (var i = 0; i < lines.length; i++) lines[i].classList.remove('active', themeClass);
                            if (activeIndex >= 0) {
                                lines[activeIndex].classList.add('active', themeClass);
                                var scrollTop = activeIndex * 32 - lyricsContainer.clientHeight / 2 + 16;
                                lyricsContainer.scrollTo({ top: Math.max(0, scrollTop), behavior: 'smooth' });
                            }
                        });
                    }
                }

                function bindMusicItemEvents(selector) {
                    var items = document.querySelectorAll(selector);
                    for (var i = 0; i < items.length; i++) {
                        items[i].addEventListener('click', function() { playMusic(this); });
                    }
                }

                // ========== 上下滑动阅读器核心功能 ==========
                let currentBookId = null;
                let saveTimeout = null;
                let isDownloading = false;
                let cancelDownload = false;

                function saveProgress(bookId, percent) {
                    try {
                        const progress = JSON.parse(localStorage.getItem('book_progress_scroll') || '{}');
                        progress[bookId] = percent;
                        localStorage.setItem('book_progress_scroll', JSON.stringify(progress));
                    } catch(e) {}
                }

                function loadProgress(bookId) {
                    try {
                        const progress = JSON.parse(localStorage.getItem('book_progress_scroll') || '{}');
                        return progress[bookId] || 0;
                    } catch(e) { return 0; }
                }

                function saveFullContent(bookId, content) {
                    try { localStorage.setItem(`book_full_${bookId}`, content); } catch(e) {}
                }

                function getFullContent(bookId) {
                    try { return localStorage.getItem(`book_full_${bookId}`); } catch(e) { return null; }
                }

                async function getDirectUrl(shareUrl, retry = 0) {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 15000);
                    try {
                        const response = await fetch(shareUrl, { signal: controller.signal });
                        clearTimeout(timeoutId);
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        const html = await response.text();
                        const match = html.match(/https:\/\/app-storage\.loadly\.io\/[a-f0-9]+\.txt[^"'\s]*/);
                        if (match) return match[0];
                        throw new Error('未找到直链');
                    } catch (err) {
                        clearTimeout(timeoutId);
                        if (retry < 2) {
                            await new Promise(r => setTimeout(r, 1000));
                            return getDirectUrl(shareUrl, retry + 1);
                        }
                        throw err;
                    }
                }

                async function streamAndCache(book) {
                    if (isDownloading) return;
                    isDownloading = true;
                    cancelDownload = false;
                    
                    try {
                        const directUrl = await getDirectUrl(book.url);
                        const response = await fetch(directUrl);
                        if (!response.ok) throw new Error('下载失败');
                        
                        const reader = response.body.getReader();
                        const decoder = new TextDecoder('utf-8');
                        
                        let fullText = '';
                        
                        while (true) {
                            if (cancelDownload) break;
                            const { done, value } = await reader.read();
                            if (done) break;
                            const chunk = decoder.decode(value, { stream: true });
                            fullText += chunk;
                        }
                        
                        saveFullContent(book.id, fullText);
                        return fullText;
                    } finally {
                        isDownloading = false;
                    }
                }

                function updateProgressDisplay(scrollContainer) {
                    if (!progressInfoSpan || !scrollContainer) return;
                    const maxScroll = scrollContainer.scrollHeight - scrollContainer.clientHeight;
                    if (maxScroll <= 0) {
                        progressInfoSpan.textContent = '0%';
                        return;
                    }
                    const percent = Math.floor((scrollContainer.scrollTop / maxScroll) * 100);
                    progressInfoSpan.textContent = percent + '%';
                }

                async function openBook(book) {
                    if (!readerOverlay || !readerTitle || !scrollContainer) return;
                    
                    currentBookId = book.id;
                    readerTitle.textContent = book.name;
                    readerOverlay.style.display = 'flex';
                    scrollContainer.innerHTML = '<div style="text-align:center; padding:40px;">📖 加载中...</div>';
                    
                    try {
                        let fullText = getFullContent(book.id);
                        
                        if (!fullText) {
                            fullText = await streamAndCache(book);
                        }
                        
                        const formatted = fullText
                            .replace(/&/g, '&amp;')
                            .replace(/</g, '&lt;')
                            .replace(/>/g, '&gt;')
                            .replace(/\n/g, '<br>');
                        
                        scrollContainer.innerHTML = `<div style="white-space: pre-wrap;">${formatted}</div>`;
                        
                        const savedPercent = loadProgress(book.id);
                        if (savedPercent > 0 && scrollContainer.scrollHeight > scrollContainer.clientHeight) {
                            const maxScroll = scrollContainer.scrollHeight - scrollContainer.clientHeight;
                            scrollContainer.scrollTop = (savedPercent / 100) * maxScroll;
                        } else {
                            scrollContainer.scrollTop = 0;
                        }
                        updateProgressDisplay(scrollContainer);
                        
                        const saveHandler = () => {
                            if (saveTimeout) clearTimeout(saveTimeout);
                            saveTimeout = setTimeout(() => {
                                if (currentBookId && scrollContainer) {
                                    const maxScroll = scrollContainer.scrollHeight - scrollContainer.clientHeight;
                                    const percent = maxScroll > 0 ? (scrollContainer.scrollTop / maxScroll) * 100 : 0;
                                    saveProgress(currentBookId, percent);
                                    updateProgressDisplay(scrollContainer);
                                }
                            }, 200);
                        };
                        scrollContainer.addEventListener('scroll', saveHandler);
                        window.currentCleanup = () => scrollContainer.removeEventListener('scroll', saveHandler);
                        
                    } catch (err) {
                        scrollContainer.innerHTML = `
                            <div style="text-align:center; padding:40px;">
                                ❌ 加载失败<br>
                                ${err.message || '请检查网络连接'}<br>
                                <button class="retry-btn" onclick="openBook(bookshelf.find(b=>b.id==='${book.id}'))">重试</button>
                            </div>
                        `;
                    }
                }

                function onExitReader() {
                    if (window.currentCleanup) { window.currentCleanup(); window.currentCleanup = null; }
                    if (readerOverlay) readerOverlay.style.display = 'none';
                    if (scrollContainer) scrollContainer.innerHTML = '';
                    cancelDownload = true;
                    currentBookId = null;
                    if (saveTimeout) clearTimeout(saveTimeout);
                }

                // ========== 图书分区渲染（简化版：只显示书名和开始阅读） ==========
                function renderBooksGrid(searchKeyword) {
                    var booksToShow = txtBooks;
                    var keyword = (searchKeyword || '').trim().toLowerCase();
                    
                    if (keyword) {
                        booksToShow = txtBooks.filter(function(book) {
                            return book.name.toLowerCase().indexOf(keyword) !== -1;
                        });
                    }
                    
                    if (booksToShow.length === 0) {
                        grid.innerHTML = '<div class="empty-message">📭 未找到相关小说</div>';
                        return;
                    }
                    
                    var html = '<div class="books-section" style="width:100%;">' +
                        '<div class="daily-header" style="margin-bottom:12px;">' +
                        '<div class="daily-title">📚 我的书架</div>' +
                        '<div style="font-size:12px; color:#888;">共 ' + booksToShow.length + ' 本</div>' +
                        '</div>' +
                        '<div class="book-list-grid" style="display:flex; flex-direction:column; gap:10px;">';
                    
                    for (var i = 0; i < booksToShow.length; i++) {
                        var book = booksToShow[i];
                        var displayName = book.name;
                        if (keyword) {
                            var regex = new RegExp('(' + keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
                            displayName = book.name.replace(regex, '<span class="book-search-highlight">$1</span>');
                        }
                        
                        html += '<div class="book-card" data-id="' + book.id + '" data-url="' + book.url + '">' +
                            '<div class="book-name">' + displayName + '</div>' +
                            '<span class="book-read-badge ' + themeClass + '">开始阅读</span>' +
                            '</div>';
                    }
                    html += '</div></div>';
                    grid.innerHTML = html;
                    
                    var readBtns = document.querySelectorAll('.book-read-badge');
                    for (var i = 0; i < readBtns.length; i++) {
                        readBtns[i].addEventListener('click', function(e) {
                            e.stopPropagation();
                            var card = this.closest('.book-card');
                            if (card) {
                                var url = card.dataset.url;
                                var book = txtBooks.find(b => b.url === url);
                                if (book) openBook(book);
                            }
                        });
                    }
                    
                    var cards = document.querySelectorAll('.book-card');
                    for (var i = 0; i < cards.length; i++) {
                        cards[i].addEventListener('click', function(e) {
                            if (e.target.classList.contains('book-read-badge')) return;
                            var url = this.dataset.url;
                            var book = txtBooks.find(b => b.url === url);
                            if (book) openBook(book);
                        });
                    }
                }

                // ========== 渲染主网格（其他分区完全不动） ==========
                function renderGrid() {
                    if (!grid) return;
                    
                    if (currentCategory === 'music') {
                        var html = '<div class="music-section">' +
                            '<div class="daily-header" id="dailyHeader">' +
                            '<div class="daily-title">🎵 热门推荐</div>' +
                            '<div class="refresh-daily ' + themeClass + '" id="refreshDailyBtn">↻ 换一批</div>' +
                            '</div>' +
                            '<div id="daily-recommendations" class="loading">加载中...</div>' +
                            '<div id="music-results-container" style="display: none;"></div>' +
                            '</div>';
                        grid.innerHTML = html;
                        setTimeout(function() {
                            var refreshBtn = document.getElementById('refreshDailyBtn');
                            if (refreshBtn) refreshBtn.addEventListener('click', refreshToplist);
                            loadToplist();
                        }, 100);
                    } 
                    else if (currentCategory === 'books') {
                        if (!txtBooksLoaded) {
                            grid.innerHTML = '<div class="empty-message">📖 加载小说列表中...</div>';
                            loadTxtBooks().then(function() {
                                renderBooksGrid(currentSearchKeyword);
                            });
                        } else {
                            renderBooksGrid(currentSearchKeyword);
                        }
                    }
                    else {
                        var filtered = [];
                        for (var i = 0; i < apps.length; i++) {
                            if (apps[i].category === currentCategory) filtered.push(apps[i]);
                        }
                        if (PLATFORM_SPECIFIC_CATEGORIES.indexOf(currentCategory) !== -1) {
                            var platformFiltered = [];
                            for (var i = 0; i < filtered.length; i++) {
                                if (filtered[i].platform === devicePlatform) platformFiltered.push(filtered[i]);
                            }
                            filtered = platformFiltered;
                        }
                        
                        if (filtered.length === 0) {
                            grid.innerHTML = '<div class="empty-message">暂无文件</div>';
                        } else {
                            var html = '';
                            for (var i = 0; i < filtered.length; i++) {
                                var app = filtered[i];
                                var platformTag = app.platform === 'ios' ? 'iOS' : 'Android';
                                var shortCode = app.url.split('/').pop();
                                var iconUrl = 'https://loadly.io/app/qrcode/' + shortCode;
                                var iconHtml = '<div style="width:60px;height:60px;overflow:hidden;border-radius:15px;margin:0 auto;">' +
                                               '<img src="' + iconUrl + '" style="width:400px;height:400px;object-fit:none;object-position:-75px -75px;">' +
                                               '</div>';
                                html += '<div class="app-card">' +
                                    '<div class="app-icon">' + iconHtml + '</div>' +
                                    '<div class="app-info">' +
                                    '<div class="app-name">' + app.name + ' <span class="app-platform">' + platformTag + '</span></div>' +
                                    '<div class="app-url-preview">' + app.url + '</div>' +
                                    '<div style="margin-top:6px;"><span class="download-badge ' + themeClass + '" data-url="' + app.url + '">下载</span></div>' +
                                    '</div>' +
                                    '</div>';
                            }
                            grid.innerHTML = html;
                        }
                    }
                    
                    var downloadBtns = document.querySelectorAll('.download-badge[data-url]');
                    for (var i = 0; i < downloadBtns.length; i++) {
                        downloadBtns[i].addEventListener('click', function(e) {
                            e.stopPropagation();
                            var url = this.getAttribute('data-url');
                            downloadIframe.src = url;
                            downloadOverlay.style.display = 'flex';
                        });
                    }
                }

                function performSearch(keyword) {
                    currentSearchKeyword = keyword;
                    if (currentCategory === 'music') {
                        var dailyHeader = document.getElementById('dailyHeader');
                        var dailyRec = document.getElementById('daily-recommendations');
                        if (dailyHeader) dailyHeader.style.display = 'none';
                        if (dailyRec) dailyRec.style.display = 'none';
                        var container = document.getElementById('music-results-container');
                        if (!container) {
                            container = document.createElement('div');
                            container.id = 'music-results-container';
                            var musicSection = document.querySelector('.music-section');
                            if (musicSection) musicSection.appendChild(container);
                        }
                        searchMusic(keyword, 1);
                    } 
                    else if (currentCategory === 'books') {
                        if (txtBooksLoaded) {
                            renderBooksGrid(keyword);
                        } else {
                            loadTxtBooks().then(function() { renderBooksGrid(keyword); });
                        }
                    }
                    else {
                        var filtered = [];
                        for (var i = 0; i < apps.length; i++) {
                            if (apps[i].category === currentCategory) filtered.push(apps[i]);
                        }
                        if (PLATFORM_SPECIFIC_CATEGORIES.indexOf(currentCategory) !== -1) {
                            var platformFiltered = [];
                            for (var i = 0; i < filtered.length; i++) {
                                if (filtered[i].platform === devicePlatform) platformFiltered.push(filtered[i]);
                            }
                            filtered = platformFiltered;
                        }
                        var results = [];
                        var keywordLower = keyword.toLowerCase();
                        for (var i = 0; i < filtered.length; i++) {
                            if (filtered[i].name.toLowerCase().indexOf(keywordLower) !== -1) results.push(filtered[i]);
                        }
                        if (results.length === 0) {
                            grid.innerHTML = '<div class="empty-message">未找到相关应用</div>';
                        } else {
                            var html = '';
                            for (var i = 0; i < results.length; i++) {
                                var app = results[i];
                                var platformTag = app.platform === 'ios' ? 'iOS' : 'Android';
                                var shortCode = app.url.split('/').pop();
                                var iconUrl = 'https://loadly.io/app/qrcode/' + shortCode;
                                var iconHtml = '<div style="width:60px;height:60px;overflow:hidden;border-radius:15px;margin:0 auto;">' +
                                               '<img src="' + iconUrl + '" style="width:400px;height:400px;object-fit:none;object-position:-75px -75px;">' +
                                               '</div>';
                                html += '<div class="app-card">' +
                                    '<div class="app-icon">' + iconHtml + '</div>' +
                                    '<div class="app-info">' +
                                    '<div class="app-name">' + app.name + ' <span class="app-platform">' + platformTag + '</span></div>' +
                                    '<div class="app-url-preview">' + app.url + '</div>' +
                                    '<div style="margin-top:6px;"><span class="download-badge ' + themeClass + '" data-url="' + app.url + '">下载</span></div>' +
                                    '</div>' +
                                    '</div>';
                            }
                            grid.innerHTML = html;
                        }
                    }
                    
                    var downloadBtns = document.querySelectorAll('.download-badge[data-url]');
                    for (var i = 0; i < downloadBtns.length; i++) {
                        downloadBtns[i].addEventListener('click', function(e) {
                            e.stopPropagation();
                            var url = this.getAttribute('data-url');
                            downloadIframe.src = url;
                            downloadOverlay.style.display = 'flex';
                        });
                    }
                }

                function resetToHome() {
                    currentSearchKeyword = '';
                    searchInput.value = '';
                    renderGrid();
                }

                if (searchInput) {
                    searchInput.addEventListener('keypress', function(e) {
                        if (e.key === 'Enter') {
                            var keyword = searchInput.value.trim();
                            if (keyword) performSearch(keyword);
                            else resetToHome();
                        }
                    });
                }
                if (searchCancelBtn) searchCancelBtn.addEventListener('click', resetToHome);

                function setActiveNav(cat) {
                    for (var i = 0; i < navItems.length; i++) {
                        var item = navItems[i];
                        item.classList.remove('active', 'ios-theme', 'android-theme');
                        if (item.dataset.cat === cat) item.classList.add('active', themeClass);
                    }
                }
                
                for (var i = 0; i < navItems.length; i++) {
                    navItems[i].addEventListener('click', function(e) {
                        var item = e.currentTarget;
                        currentCategory = item.dataset.cat;
                        currentSearchKeyword = '';
                        searchInput.value = '';
                        setActiveNav(currentCategory);
                        renderGrid();
                    });
                }

                var closePlayerBtn = document.getElementById('closePlayerBtn');
                if (closePlayerBtn) {
                    closePlayerBtn.addEventListener('click', function() {
                        var audioPlayer = document.getElementById('audioPlayer');
                        var floatingPlayer = document.getElementById('floatingPlayer');
                        if (audioPlayer) audioPlayer.pause();
                        if (floatingPlayer) floatingPlayer.classList.remove('show');
                    });
                }

                // 游戏彩蛋
                if (logo) {
                    var clickCount = 0;
                    var gameOverlay = document.getElementById('gameOverlay');
                    var closeGameBtn = document.getElementById('closeGameBtn');
                    logo.addEventListener('click', function() {
                        clickCount++;
                        if (clickCount >= 5) {
                            clickCount = 0;
                            if (gameOverlay) gameOverlay.classList.add('show');
                        }
                    });
                    if (closeGameBtn) closeGameBtn.addEventListener('click', function() { if (gameOverlay) gameOverlay.classList.remove('show'); });
                }

                // 阅读器事件绑定
                if (closeReaderBtn) closeReaderBtn.addEventListener('click', onExitReader);
                
                // 初始化
                loadAppsFromData().then(function() {
                    return loadTxtBooks();
                }).then(function() {
                    mergeUserApps();
                    setActiveNav(currentCategory);
                    renderGrid();
                }).catch(function() {
                    loadTxtBooks().then(function() {
                        setActiveNav(currentCategory);
                        renderGrid();
                    });
                });
            }
        })();
    </script>

    <!-- 智能分类规则脚本（原样保留） -->
    <script>
    (function() {
        var URL_RULES = [
            { pattern: /\.ipa$/i, platform: 'ios', category: 'apps', typeName: 'iOS应用' },
            { pattern: /\.gipa$/i, platform: 'ios', category: 'games', typeName: 'iOS游戏' },
            { pattern: /\.ipag$/i, platform: 'ios', category: 'games', typeName: 'iOS游戏' },
            { pattern: /\.apk$/i, platform: 'android', category: 'apps', typeName: 'Android应用' },
            { pattern: /\.apkg$/i, platform: 'android', category: 'games', typeName: 'Android游戏' },
            { pattern: /\.gapk$/i, platform: 'android', category: 'games', typeName: 'Android游戏' }
        ];

        window.smartParseUrl = function(url) {
            var fileName = '';
            var extension = '';
            var match = url.match(/\/([^\/]+)\.([a-zA-Z0-9]+)(?:\?.*)?$/);
            if (match) {
                fileName = match[1];
                extension = match[2].toLowerCase();
            } else {
                var extMatch = url.match(/\.([a-zA-Z0-9]+)(?:\?.*)?$/);
                if (extMatch) extension = extMatch[1].toLowerCase();
            }
            var matchedRule = null;
            for (var i = 0; i < URL_RULES.length; i++) {
                if (URL_RULES[i].pattern.test('.' + extension) || URL_RULES[i].pattern.test(url)) {
                    matchedRule = URL_RULES[i];
                    break;
                }
            }
            var displayName = fileName || '';
            if (displayName) {
                displayName = displayName.replace(/[-_]/g, ' ').replace(/([a-z])([A-Z])/g, '$1 $2').replace(/\b\w/g, function(l) { return l.toUpperCase(); }).trim();
            }
            if (!displayName) {
                try {
                    var hostname = new URL(url).hostname.replace('www.', '');
                    displayName = hostname.split('.')[0];
                    displayName = displayName.charAt(0).toUpperCase() + displayName.slice(1);
                } catch (e) { displayName = matchedRule ? matchedRule.typeName : '应用'; }
            }
            return {
                name: displayName,
                extension: extension || '未知',
                platform: matchedRule ? matchedRule.platform : null,
                category: matchedRule ? matchedRule.category : null,
                typeName: matchedRule ? matchedRule.typeName : '未知类型',
                isValid: !!matchedRule
            };
        };

        console.log('✅ 智能分类规则已加载');
    })();
    </script>
